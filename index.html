<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCOUT · Daily Football Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b10;--surface:#0e1219;--card:#131820;--border:#1c2333;--accent:#3b82f6;--accent2:#1d4ed8;--text:#f1f5f9;--muted:#64748b;--subtle:#1e293b}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
.cond{font-family:'Barlow Condensed',sans-serif}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.setup-box{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:2rem}
.ball{font-size:3rem;display:block;margin-bottom:.5rem;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:3.5rem;letter-spacing:.12em;color:var(--text);line-height:1}
.logo-sub{color:var(--muted);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;margin-top:.4rem}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem}
.field-label{color:var(--muted);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.4rem;display:block}
.field-input{width:100%;background:#080b10;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.875rem;outline:none;transition:border-color .2s;margin-bottom:.35rem}
.field-input:focus{border-color:var(--accent)}
.field-note{color:#4b5563;font-size:.68rem;margin-bottom:1.25rem;line-height:1.5}
.field-note a{color:var(--accent);text-decoration:none}
.save-row{display:flex;align-items:center;gap:.5rem;margin:.5rem 0 1rem}
.save-row input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.save-row label{color:var(--muted);font-size:.8rem;cursor:pointer}
.btn-launch{width:100%;background:var(--accent);border:none;border-radius:8px;padding:13px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:.12em;cursor:pointer;transition:background .2s}
.btn-launch:hover{background:var(--accent2)}
.setup-err{color:#fca5a5;font-size:.75rem;margin:.4rem 0;min-height:1rem}
#app{display:none;flex-direction:column;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.1rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;letter-spacing:.1em;line-height:1;flex:1;min-width:0}
.hdr-sub{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.btn-refresh{background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.1em;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-refresh:hover{background:var(--accent2)}
.btn-refresh:disabled{background:#1e293b;color:var(--muted);cursor:not-allowed}
.btn-keys{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:.75rem;padding:7px 10px;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap}
.btn-keys:hover{border-color:var(--accent);color:var(--accent)}
.toggle-row{width:100%;display:flex;align-items:center;gap:8px;padding-top:.5rem;border-top:1px solid var(--border);margin-top:.5rem}
.toggle-label{color:var(--muted);font-size:.72rem;letter-spacing:.08em}
.toggle-btn{background:var(--subtle);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.72rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;padding:4px 12px;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
main{flex:1;max-width:660px;width:100%;margin:0 auto;padding:1.2rem 1rem 3rem}
#loading{display:none;flex-direction:column;align-items:center;padding:3.5rem 1rem;text-align:center}
.spin{font-size:2.5rem;animation:spin 1.1s linear infinite;display:block;margin-bottom:1.25rem}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.load-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--accent);margin-bottom:.4rem}
.load-stage{color:var(--muted);font-size:.75rem;margin-bottom:1rem;max-width:280px;line-height:1.6}
.prog-track{width:240px;height:3px;background:var(--subtle);border-radius:4px;overflow:hidden;margin-bottom:.5rem}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#6366f1);border-radius:4px;width:0%;transition:width .5s ease}
.prog-pct{color:#374151;font-size:.65rem}
.stats-bar{display:flex;gap:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat-label{color:var(--muted);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;color:var(--text);line-height:1.1}
.league-section{margin-bottom:2rem}
.league-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.lg-flag{font-size:1.1rem}
.lg-name{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;letter-spacing:.07em;color:var(--text)}
.lg-chev{margin-left:auto;color:var(--muted);font-size:.72rem}
.lg-ctx{color:#4b5563;font-size:.75rem;margin-bottom:.75rem;line-height:1.6;padding-left:.2rem}
.pick-card{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:.6rem;overflow:hidden}
.pick-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.pick-num{width:24px;height:24px;border-radius:50%;background:var(--subtle);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--accent)}
.pick-info{flex:1;min-width:0}
.matchup{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.kickoff{font-size:.68rem;color:var(--muted);margin-top:2px}
.pick-right{text-align:right;flex-shrink:0}
.conf{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.08em;padding:2px 7px;border-radius:4px;display:block;margin-bottom:3px}
.conf-h{background:#052e16;color:#6ee7b7;border:1px solid #065f46}
.conf-m{background:#1c1107;color:#fcd34d;border:1px solid #92400e}
.pick-chev{color:var(--muted);font-size:.68rem}
.pick-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.pick-target{display:inline-flex;align-items:center;gap:8px;background:#0f172a;color:#93c5fd;font-size:.75rem;padding:6px 12px;border-radius:6px;margin:10px 0 8px;border:1px solid #1e3a5f;flex-wrap:wrap}
.xg-badge{background:#1e3a5f;color:#7dd3fc;font-size:.68rem;padding:2px 7px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em}
.injury-row{display:flex;align-items:flex-start;gap:6px;background:#0f1520;border:1px solid #1c2333;border-radius:6px;padding:7px 10px;margin-bottom:10px;font-size:.75rem}
.pick-reason{color:#94a3b8;font-size:.8rem;line-height:1.8;margin-bottom:10px}
.form-section{margin-bottom:10px}
.form-label{color:var(--muted);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.form-strip{display:flex;gap:4px;flex-wrap:wrap}
.form-game{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:44px;flex:1}
.form-result{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:600;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.res-w{background:#052e16;color:#6ee7b7}
.res-d{background:#1c1a00;color:#fde68a}
.res-l{background:#1a0505;color:#fca5a5}
.form-score{font-size:.6rem;color:var(--muted);line-height:1.2;text-align:center}
.form-xg{font-size:.58rem;color:#374151;line-height:1.2;text-align:center}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.tag{font-size:.63rem;padding:2px 8px;border-radius:999px}
.t-title{background:#1c1107;color:#fcd34d;border:1px solid #78350f}
.t-rel{background:#1a0505;color:#fca5a5;border:1px solid #7f1d1d}
.t-play{background:#1a1035;color:#c4b5fd;border:1px solid #4c1d95}
.t-euro{background:#0c1a2e;color:#93c5fd;border:1px solid #1e3a5f}
.t-form{background:#052e16;color:#6ee7b7;border:1px solid #065f46}
.t-must{background:#1c0f00;color:#fdba74;border:1px solid #7c2d12}
.t-def{background:#1f0a1a;color:#f9a8d4;border:1px solid #831843}
.t-dflt{background:var(--subtle);color:var(--muted);border:1px solid var(--border)}
.err-box{background:#1a0505;border:1px solid #7f1d1d;border-radius:10px;padding:1rem 1.1rem;margin-bottom:1.2rem}
.err-msg{color:#fca5a5;font-size:.8rem;line-height:1.6;margin-bottom:.4rem}
.btn-retry{background:#7f1d1d;border:none;border-radius:6px;color:#fca5a5;font-size:.72rem;padding:5px 12px;cursor:pointer;margin-top:4px}
.debug-out{background:#0a0a0f;border:1px solid #1c2333;border-radius:6px;padding:10px;font-size:.6rem;color:#4b5563;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin-top:10px;line-height:1.5}
.footer{text-align:center;color:#1e293b;font-size:.6rem;letter-spacing:.1em;padding-top:.5rem;text-transform:uppercase}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-box">
    <div class="logo-area">
      <span class="ball">⚽</span>
      <div class="logo-title cond">SCOUT</div>
      <div class="logo-sub">Live scoring intelligence · 7 leagues</div>
    </div>
    <div class="setup-card">
      <label class="field-label">Anthropic key</label>
      <input id="ant-key" class="field-input" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false"/>
      <p class="field-note">From <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys. Each refresh costs ~5p.</p>
      <div class="save-row">
        <input type="checkbox" id="remember" checked/>
        <label for="remember">Remember key on this device</label>
      </div>
      <div id="setup-err" class="setup-err"></div>
      <button class="btn-launch" id="launch-btn" onclick="launch()">LAUNCH SCOUT →</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div style="flex:1;min-width:0">
      <div class="hdr-title cond">⚽ SCOUT</div>
      <div class="hdr-sub" id="last-updated">—</div>
    </div>
    <button class="btn-refresh" id="refresh-btn" onclick="runAnalysis(true)">↻ REFRESH</button>
    <button class="btn-keys" onclick="goSetup()">KEYS</button>
    <div class="toggle-row">
      <span class="toggle-label">SHOWING:</span>
      <button class="toggle-btn active" id="btn-7" onclick="setWindow(7)">7 DAYS · TOP 3</button>
      <button class="toggle-btn" id="btn-14" onclick="setWindow(14)">14 DAYS · TOP 5</button>
    </div>
  </header>
  <main>
    <div id="loading">
      <span class="spin">⚽</span>
      <div class="load-title cond" id="load-title">SEARCHING LIVE DATA</div>
      <div class="load-stage" id="load-stage">Searching for current season fixtures…</div>
      <div class="prog-track"><div class="prog-bar" id="prog"></div></div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div id="results"></div>
  </main>
</div>

<script>
var antKey = "";
var currentWindow = 7;
var cachedAnalysis = null;
var lastDebug = "";

var CACHE_KEY  = "scout_data_v4";
var CACHE_TS   = "scout_ts_v4";
var CACHE_HRS  = 4;

function saveCache(a) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(a)); localStorage.setItem(CACHE_TS, Date.now().toString()); } catch(e) {}
}
function loadCache() {
  try {
    var t = localStorage.getItem(CACHE_TS), d = localStorage.getItem(CACHE_KEY);
    if (!t || !d) return null;
    if (Date.now() - parseInt(t) > CACHE_HRS * 3600000) return null;
    return { data: JSON.parse(d), ts: parseInt(t) };
  } catch(e) { return null; }
}
function fmtTs(ts) {
  var d = new Date(ts);
  return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}) + " at " + d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function setBanner(ts, cached) {
  var el = document.getElementById("last-updated");
  if (el) el.textContent = (cached ? "Cached · " : "Live · ") + "Last updated " + fmtTs(ts);
}

function setWindow(days) {
  currentWindow = days;
  document.getElementById("btn-7").className  = "toggle-btn" + (days === 7  ? " active" : "");
  document.getElementById("btn-14").className = "toggle-btn" + (days === 14 ? " active" : "");
  if (cachedAnalysis) render(cachedAnalysis);
}

function setP(pct, stage, title) {
  var p = Math.min(Math.round(pct), 100);
  document.getElementById("prog").style.width = p + "%";
  document.getElementById("prog-pct").textContent = p + "%";
  if (stage) document.getElementById("load-stage").textContent = stage;
  if (title) document.getElementById("load-title").textContent = title;
}

function showApp()  { document.getElementById("setup").style.display = "none";  document.getElementById("app").style.display = "flex"; }
function goSetup()  { document.getElementById("app").style.display = "none";    document.getElementById("setup").style.display = "flex"; }
function showError(msg) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("results").innerHTML =
    "<div class='err-box'>"
    + "<p class='err-msg'><strong>" + esc(msg) + "</strong></p>"
    + "<p style='color:#6b7280;font-size:.72rem;margin-bottom:4px'>Tap KEYS to check your Anthropic key is correct.</p>"
    + "<button class='btn-retry' onclick='runAnalysis(true)'>Try again</button>"
    + (lastDebug ? "<div class='debug-out'>" + esc(lastDebug) + "</div>" : "")
    + "</div>";
}

window.addEventListener("DOMContentLoaded", function() {
  var sa = localStorage.getItem("scout_ant");
  if (sa) {
    antKey = sa;
    document.getElementById("ant-key").value = sa;
    showApp();
    runAnalysis(false);
  }
});

function launch() {
  var ant = document.getElementById("ant-key").value.trim();
  var err = document.getElementById("setup-err");
  if (!ant) { err.textContent = "Please enter your Anthropic key."; return; }
  if (ant.indexOf("sk-") !== 0) { err.textContent = "Anthropic keys start with sk-ant- — check you copied it fully."; return; }
  err.textContent = "";
  antKey = ant;
  if (document.getElementById("remember").checked) localStorage.setItem("scout_ant", ant);
  showApp();
  runAnalysis(false);
}

async function callClaude(messages, useSearch, maxTok) {
  var body = { model: "claude-sonnet-4-5", max_tokens: maxTok || 8000, messages: messages };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  var r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": antKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  if (r.status === 401) throw new Error("Anthropic key rejected — tap KEYS to update it.");
  if (r.status === 429) throw new Error("Rate limited — wait 2 minutes then tap Refresh.");
  if (r.status === 402) throw new Error("No Anthropic credits — add credit at console.anthropic.com.");
  if (r.status === 529) throw new Error("Anthropic overloaded — try again in a few minutes.");
  if (!r.ok) {
    var e = await r.json().catch(function(){ return {}; });
    throw new Error(e && e.error && e.error.message ? e.error.message : "Anthropic error " + r.status);
  }
  var data = await r.json();
  var text = "";
  if (data.content) {
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === "text") text += data.content[i].text;
    }
  }
  return text;
}

async function runAnalysis(force) {
  if (!force) {
    var cache = loadCache();
    if (cache) { cachedAnalysis = cache.data; render(cache.data); setBanner(cache.ts, true); return; }
  }

  var btn = document.getElementById("refresh-btn");
  var loading = document.getElementById("loading");
  btn.disabled = true;
  document.getElementById("results").innerHTML = "";
  loading.style.display = "flex";
  lastDebug = "";

  var now = new Date();
  var cut14 = new Date(now); cut14.setDate(now.getDate() + 14);
  var fmt = function(d) { return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long",year:"numeric"}); };
  var todayStr = fmt(now);
  var cutStr   = fmt(cut14);
  var yr = now.getFullYear();

  var pct = 5;
  setP(pct, "Searching for " + yr + " season fixtures…", "SEARCHING LIVE DATA");
  var ticker = setInterval(function() {
    pct = Math.min(pct + 0.25, 82);
    setP(pct);
    if (pct > 25 && pct < 26) setP(pct, "Checking standings and recent form…");
    if (pct > 50 && pct < 51) setP(pct, "Looking up injury news and xG data…");
    if (pct > 68 && pct < 69) setP(pct, "Building analysis…", "GENERATING ANALYSIS");
  }, 700);

  try {
    var prompt =
      "Today is " + todayStr + ". Season: " + yr + "-" + (yr-1999) + ".\n\n" +
      "STRICT RULE: Only include fixtures from the CURRENT " + yr + "-" + (yr-1999) + " season scheduled between " + todayStr + " and " + cutStr + ". No past results as picks. No fixtures from any other season.\n\n" +
      "Search the web for current " + yr + "-" + (yr-1999) + " fixtures, standings, form, xG and injuries for:\n" +
      "Premier League, EFL Championship, La Liga, Bundesliga, Ligue 1, Primeira Liga, Super Lig Turkey.\n\n" +
      "Pick top 5 UPCOMING fixtures per league where one team is most likely to score.\n\n" +
      "Respond with ONLY a JSON object. No intro text, no explanation, no markdown. Start with { end with }.\n\n" +
      "{\"leagues\":[{\"league\":\"name\",\"flag\":\"emoji\",\"context\":\"one sentence\",\"picks\":[{\"home\":\"team\",\"away\":\"team\",\"date\":\"e.g. Sat 3 May " + yr + "\",\"time\":\"15:00\",\"pickTeam\":\"team\",\"confidence\":\"High or Medium\",\"xg\":1.8,\"reason\":\"3 sentences\",\"injuries\":\"injuries or No significant injuries\",\"tags\":[\"tag\"],\"form\":[{\"result\":\"W\",\"score\":\"2-0\",\"xg\":2.1,\"actual\":2},{\"result\":\"D\",\"score\":\"1-1\",\"xg\":1.3,\"actual\":1},{\"result\":\"W\",\"score\":\"1-0\",\"xg\":1.5,\"actual\":1},{\"result\":\"L\",\"score\":\"0-1\",\"xg\":0.9,\"actual\":0},{\"result\":\"W\",\"score\":\"2-1\",\"xg\":1.7,\"actual\":2}]}]}]}\n\n" +
      "form: 5 items most recent first, W/D/L only, xg and actual are numbers.";

    var raw = await callClaude([{ role: "user", content: prompt }], true, 16000);
    lastDebug = "RAW RESPONSE (" + raw.length + " chars):\n" + raw;

    clearInterval(ticker);
    setP(88, "Parsing response…", "ALMOST DONE");

    var txt = raw.replace(/```json|```/g, "").trim();
    var s = txt.indexOf("{");
    var e = txt.lastIndexOf("}");

    if (s === -1 || e === -1 || !txt.slice(s, e+1).includes("leagues")) {
      setP(90, "Tidying format…");
      var tidy = await callClaude([{
        role: "user",
        content: "Extract and return ONLY the JSON object from this text. Start with { end with }. No other text:\n\n" + raw.slice(0, 10000)
      }], false, 12000);
      lastDebug += "\n\nTIDY RESPONSE (" + tidy.length + " chars):\n" + tidy;
      txt = tidy.replace(/```json|```/g, "").trim();
      s = txt.indexOf("{");
      e = txt.lastIndexOf("}");
    }

    if (s === -1 || e === -1) throw new Error("No JSON found in response.");

    var analysis;
    try {
      analysis = JSON.parse(txt.slice(s, e+1));
    } catch(pe) {
      throw new Error("JSON parse error: " + pe.message);
    }

    if (!analysis || !analysis.leagues || analysis.leagues.length === 0) throw new Error("Empty leagues array returned.");

    saveCache(analysis);
    cachedAnalysis = analysis;
    setP(100);
    loading.style.display = "none";
    render(analysis);
    setBanner(Date.now(), false);

  } catch(err) {
    clearInterval(ticker);
    btn.disabled = false;
    showError(err.message);
    return;
  }
  btn.disabled = false;
}

function render(a) {
  var res = document.getElementById("results");
  var max = currentWindow === 7 ? 3 : 5;
  var total = (a.leagues||[]).reduce(function(n,l){ return n + Math.min((l.picks||[]).length, max); }, 0);

  var html = "<div class='stats-bar'>"
    + "<div><div class='stat-label'>Leagues</div><div class='stat-val'>" + (a.leagues||[]).length + "</div></div>"
    + "<div><div class='stat-label'>Picks</div><div class='stat-val'>" + total + "</div></div>"
    + "<div><div class='stat-label'>Window</div><div class='stat-val'>" + currentWindow + "d</div></div>"
    + "</div>";

  (a.leagues||[]).forEach(function(lg, li) {
    var picks = (lg.picks||[]).slice(0, max);
    html += "<div class='league-section'>"
      + "<div class='league-hdr' onclick='toggleLg(" + li + ")'>"
      + "<span class='lg-flag'>" + (lg.flag||"") + "</span>"
      + "<span class='lg-name cond'>" + esc(lg.league) + "</span>"
      + "<span class='lg-chev' id='lc-" + li + "'>▲</span></div>";
    if (lg.context) html += "<p class='lg-ctx'>" + esc(lg.context) + "</p>";
    html += "<div id='lb-" + li + "'>";

    picks.forEach(function(pick, pi) {
      var bid = "pb-"+li+"-"+pi, cid = "pc-"+li+"-"+pi;
      var open = pi === 0;

      var formHtml = "";
      if (pick.form && pick.form.length) {
        formHtml += "<div class='form-section'><div class='form-label'>Last 5 — " + esc(pick.pickTeam) + "</div><div class='form-strip'>";
        pick.form.forEach(function(g) {
          var rc = g.result==="W" ? "res-w" : g.result==="D" ? "res-d" : "res-l";
          formHtml += "<div class='form-game'>"
            + "<div class='form-result " + rc + "'>" + esc(g.result||"?") + "</div>"
            + "<div class='form-score'>" + esc(g.score||"") + "</div>"
            + "<div class='form-xg'>xG " + (g.xg!=null ? parseFloat(g.xg).toFixed(1) : "?") + "</div>"
            + "<div class='form-xg'>&#9917; " + (g.actual!=null ? g.actual : "?") + "</div>"
            + "</div>";
        });
        formHtml += "</div></div>";
      }

      var injCol = pick.injuries && pick.injuries.toLowerCase().indexOf("no significant") > -1 ? "#6ee7b7" : "#fcd34d";
      var injHtml = pick.injuries ? "<div class='injury-row'><span style='flex-shrink:0'>&#127973;</span><span style='color:" + injCol + "'>" + esc(pick.injuries) + "</span></div>" : "";

      html += "<div class='pick-card'>"
        + "<div class='pick-hdr' onclick='togglePick(\"" + bid + "\",\"" + cid + "\")'>"
        + "<div class='pick-num'>" + (pi+1) + "</div>"
        + "<div class='pick-info'>"
        + "<div class='matchup'>" + esc(pick.home) + " <span style='color:var(--muted)'>vs</span> " + esc(pick.away) + "</div>"
        + "<div class='kickoff'>" + esc(pick.date) + " &middot; " + esc(pick.time) + "</div>"
        + "</div>"
        + "<div class='pick-right'>"
        + "<span class='conf " + (pick.confidence==="High" ? "conf-h" : "conf-m") + "'>" + esc(pick.confidence||"") + "</span>"
        + "<div class='pick-chev' id='" + cid + "'>" + (open?"▲":"▼") + "</div>"
        + "</div></div>"
        + "<div class='pick-body' id='" + bid + "' style='display:" + (open?"block":"none") + "'>"
        + "<div class='pick-target'>&#127919; " + esc(pick.pickTeam) + " to score"
        + (pick.xg ? "<span class='xg-badge'>xG " + parseFloat(pick.xg).toFixed(2) + "</span>" : "")
        + "</div>"
        + injHtml + formHtml
        + "<p class='pick-reason'>" + esc(pick.reason) + "</p>"
        + "<div class='tags'>" + (pick.tags||[]).map(function(t){ return "<span class='tag " + tc(t) + "'>" + esc(t) + "</span>"; }).join("") + "</div>"
        + "</div></div>";
    });
    html += "</div></div>";
  });

  html += "<p class='footer'>Scout &middot; Powered by Claude with web search &middot; Personal use only</p>";
  res.innerHTML = html;
}

function toggleLg(li) {
  var b = document.getElementById("lb-"+li), c = document.getElementById("lc-"+li);
  var h = b.style.display === "none";
  b.style.display = h ? "block" : "none"; c.textContent = h ? "▲" : "▼";
}
function togglePick(bid, cid) {
  var b = document.getElementById(bid), c = document.getElementById(cid);
  var o = b.style.display !== "none";
  b.style.display = o ? "none" : "block"; c.textContent = o ? "▼" : "▲";
}
function tc(t) {
  t = (t||"").toLowerCase();
  if (t.indexOf("title")>-1) return "t-title";
  if (t.indexOf("relega")>-1) return "t-rel";
  if (t.indexOf("playoff")>-1) return "t-play";
  if (t.indexOf("european")>-1||t.indexOf("europe")>-1) return "t-euro";
  if (t.indexOf("form")>-1||t.indexOf("fire")>-1) return "t-form";
  if (t.indexOf("must")>-1||t.indexOf("despera")>-1) return "t-must";
  if (t.indexOf("defenc")>-1||t.indexOf("defens")>-1) return "t-def";
  return "t-dflt";
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
