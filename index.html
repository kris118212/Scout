<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- CSP removed -->
<title>SCOUT · Football Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0f;--surface:#0c1018;--card:#111620;--card2:#161d28;
  --border:#1e2a38;--border2:#253040;
  --accent:#00d4ff;--accent2:#0099bb;
  --green:#00e676;--amber:#ffab00;--red:#ff4444;--purple:#b46eff;
  --text:#eef2f7;--muted:#5a7080;--muted2:#3a4f60;
  --nav-h:60px;--bottom-h:62px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* HEADER */
header{height:var(--nav-h);background:rgba(7,10,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.12em;line-height:1}
.logo span{color:var(--accent)}
.hdr-sub{font-size:.58rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:20px;padding:3px 9px;font-size:.6rem;letter-spacing:.1em;color:var(--green);text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-hdr{border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.75rem;padding:6px 12px;cursor:pointer}
.btn-refresh{background:var(--accent);color:#000;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.08em;padding:6px 14px}
.btn-keys{background:transparent;border:1px solid var(--border2);color:var(--muted)}

/* BOTTOM NAV */
.bottom-nav{height:var(--bottom-h);background:rgba(7,10,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;padding:0;position:relative;transition:all .15s}
.nav-item.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.nav-icon{font-size:1rem;line-height:1}
.nav-label{font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.nav-item.active .nav-label,.nav-item.active .nav-icon{color:var(--accent);filter:none}

/* MAIN */
main{margin-top:var(--nav-h);margin-bottom:var(--bottom-h);padding:1.1rem 1rem 1rem;max-width:700px;margin-left:auto;margin-right:auto;position:relative;z-index:1}
.page{display:none}.page.active{display:block}

/* SECTION HDR */
.section-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:1.1rem;padding-bottom:.65rem;border-bottom:1px solid var(--border)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.08em}
.section-sub{font-size:.67rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.section-badge{margin-left:auto;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);border-radius:4px;padding:2px 8px;font-size:.6rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}

/* STATS ROW */
.stats-row{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;flex:1;min-width:70px}
.stat-label{font-size:.56rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--text);line-height:1}
.stat-val.c-accent{color:var(--accent)}.stat-val.c-green{color:var(--green)}

/* WINDOW TOGGLE */
.window-toggle{display:flex;gap:6px;margin-bottom:1.1rem}
.win-btn,.fx-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 14px;font-size:.7rem;font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;cursor:pointer;color:var(--muted);transition:all .15s}
.win-btn.active,.fx-btn.active{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}

/* LEAGUE SECTION */
.league-section{margin-bottom:2rem}
.league-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;padding-bottom:.55rem;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.lg-flag{font-size:.95rem}.lg-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em}
.lg-chev{margin-left:auto;color:var(--muted);font-size:.6rem}
.lg-ctx{color:var(--muted);font-size:.7rem;margin-bottom:.7rem;line-height:1.6}

/* TABLE TOGGLE */
.tbl-toggle{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:.65rem;letter-spacing:.07em;cursor:pointer;margin-bottom:.75rem;padding:3px 9px;border:1px solid var(--border);border-radius:5px;transition:all .15s}
.tbl-toggle:hover{color:var(--accent);border-color:rgba(0,212,255,.3)}
.tbl-toggle.open{color:var(--accent);border-color:rgba(0,212,255,.3)}
.standings-wrap{display:none;margin-bottom:1rem;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.standings-wrap.open{display:block}
.standings-tbl{width:100%;border-collapse:collapse;font-size:.7rem}
.standings-tbl th{color:var(--muted);font-weight:400;padding:5px 7px;text-align:right;border-bottom:1px solid var(--border);font-size:.58rem;letter-spacing:.06em;background:var(--surface)}
.standings-tbl th:first-child,.standings-tbl td:first-child{text-align:center;width:26px}
.standings-tbl th:nth-child(2),.standings-tbl td:nth-child(2){text-align:left;padding-left:5px;min-width:110px}
.standings-tbl td{padding:5px 7px;text-align:right;border-bottom:1px solid #0a0e15;color:#7a9ab0;font-family:'DM Mono',monospace;font-size:.68rem}
.standings-tbl tr:hover td{background:#0f1520}
.s-pts{color:var(--text)!important;font-weight:500}.s-team{color:var(--text)!important;font-family:'DM Sans',sans-serif!important;font-size:.75rem!important}
.s-form span{display:inline-block;width:12px;height:12px;border-radius:2px;font-size:.48rem;line-height:12px;text-align:center;margin-left:1px;font-weight:600}
.s-fw{background:rgba(0,230,118,.15);color:var(--green)}.s-fd{background:rgba(255,171,0,.15);color:var(--amber)}.s-fl{background:rgba(255,68,68,.15);color:var(--red)}
.zone-promo td:first-child{border-left:3px solid #3b82f6}.zone-playoff td:first-child{border-left:3px solid #8b5cf6}
.zone-euro td:first-child{border-left:3px solid #10b981}.zone-rel td:first-child{border-left:3px solid #ef4444}
.zone-sep td{border-top:2px dashed #1c2333}
.tbl-legend{display:flex;gap:10px;flex-wrap:wrap;padding:5px 8px;background:var(--surface);font-size:.58rem;color:var(--muted)}
.tbl-legend-item{display:flex;align-items:center;gap:3px}
.tbl-legend-dot{width:7px;height:7px;border-radius:1px;flex-shrink:0}

/* ═══ PICK CARD ═══ */
.pick-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.75rem;overflow:hidden;transition:border-color .15s}
.pick-card:hover{border-color:var(--border2)}
.pick-hdr{padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:pointer}
.pick-num{width:24px;height:24px;border-radius:50%;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent)}
.pick-info{flex:1;min-width:0}
.matchup{font-size:.88rem;font-weight:500;white-space:normal;line-height:1.3;word-break:break-word}
.kickoff{font-size:.63rem;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:.04em}
.conf{font-size:.6rem;letter-spacing:.06em;padding:2px 7px;border-radius:4px;font-weight:500;display:block;margin-bottom:2px}
.conf-h{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.15)}
.conf-m{background:rgba(255,171,0,.1);color:var(--amber);border:1px solid rgba(255,171,0,.15)}
.conf-l{background:rgba(255,100,100,.1);color:#f87171;border:1px solid rgba(255,100,100,.15)}
.conf-vl{background:rgba(150,150,150,.1);color:var(--muted);border:1px solid rgba(150,150,150,.15)}
.pick-chev{color:var(--muted);font-size:.62rem}

.pick-body{padding:0 13px 13px;border-top:1px solid var(--border)}

/* Primary pick */
.primary-pick{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.12);border-radius:8px;padding:.75rem;margin:10px 0 10px}
.primary-pick-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.primary-pick-name{font-size:.88rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.xg-badge{background:rgba(0,212,255,.12);color:var(--accent);font-size:.62rem;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace}
.odds-badge{background:rgba(0,230,118,.1);color:var(--green);font-size:.62rem;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;border:1px solid rgba(0,230,118,.15)}

/* Bet builder section */
.builder-section{margin:10px 0}
.builder-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.builder-label::after{content:'';flex:1;height:1px;background:var(--border)}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.builder-pick{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;cursor:pointer;transition:all .15s;position:relative}
.builder-pick:hover{border-color:var(--border2)}
.builder-pick.selected{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.25)}
.bp-name{font-size:.75rem;font-weight:500;line-height:1.3}
.bp-odds{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--green);margin-top:2px}
.bp-conf{position:absolute;top:6px;right:7px;font-size:.55rem;color:var(--muted)}

/* Combo builder */
.combo-section{background:rgba(180,110,255,.04);border:1px solid rgba(180,110,255,.12);border-radius:8px;padding:.75rem;margin:10px 0}
.combo-label{font-size:.58rem;color:var(--purple);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.combo-pick{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(180,110,255,.08)}
.combo-pick:last-child{border-bottom:none;padding-bottom:0}
.combo-name{font-size:.75rem;color:var(--text)}
.combo-odds{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--purple)}

/* Injury + reason + form */
.injury-row{display:flex;align-items:flex-start;gap:6px;background:rgba(255,171,0,.04);border:1px solid rgba(255,171,0,.1);border-radius:6px;padding:6px 9px;margin-bottom:9px;font-size:.7rem;color:var(--amber)}
.pick-reason{color:#6a8a9a;font-size:.76rem;line-height:1.8;margin-bottom:9px}
.form-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.form-strip{display:flex;gap:3px;margin-bottom:9px}
.fg{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:38px}
.fr{width:19px;height:19px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;font-family:'DM Mono',monospace}
.fr-w{background:rgba(0,230,118,.12);color:var(--green)}.fr-d{background:rgba(255,171,0,.12);color:var(--amber)}.fr-l{background:rgba(255,68,68,.12);color:var(--red)}
.fg-txt{font-size:.52rem;color:var(--muted2);line-height:1.3;text-align:center}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:.58rem;padding:2px 7px;border-radius:999px;background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* ═══ MATCH DAY ═══ */
.matchday-date{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:.65rem;padding-top:.15rem}
.fixture-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.75rem}
@media(max-width:400px){.fixture-grid{grid-template-columns:1fr}}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.75rem .85rem;display:flex;flex-direction:column;gap:4px}
.match-fixture{font-size:.8rem;font-weight:500;line-height:1.3}
.match-vs{color:var(--muted);font-size:.65rem;margin:0 3px}
.match-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.match-time{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--accent)}
.match-league{font-size:.58rem;color:var(--muted);background:var(--card2);padding:2px 5px;border-radius:3px}
.form-mini{display:flex;gap:2px}
.fm{width:13px;height:13px;border-radius:2px;font-size:.48rem;display:flex;align-items:center;justify-content:center;font-weight:600}
.match-verdict{font-size:.6rem;padding:2px 7px;border-radius:4px;margin-top:3px;white-space:nowrap}
.verd-score{background:rgba(0,230,118,.08);color:var(--green);border:1px solid rgba(0,230,118,.12)}
.verd-neutral{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* ═══ FORM TABLE ═══ */
.league-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:1.1rem;scrollbar-width:none}
.league-tabs::-webkit-scrollbar{display:none}
.league-tab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:4px 11px;font-size:.68rem;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s}
.league-tab.active{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.25);color:var(--accent)}
.form-tbl{width:100%;border-collapse:collapse;font-size:.72rem}
.form-tbl th{color:var(--muted);font-weight:400;padding:5px 7px;text-align:left;border-bottom:1px solid var(--border);font-size:.58rem;letter-spacing:.07em;text-transform:uppercase}
.form-tbl th:not(:first-child):not(:nth-child(2)){text-align:right}
.form-tbl td{padding:7px 7px;border-bottom:1px solid rgba(30,42,56,.4);vertical-align:middle}
.form-tbl td:not(:first-child):not(:nth-child(2)){text-align:right;font-family:'DM Mono',monospace;font-size:.68rem}
.form-tbl tr:hover td{background:rgba(255,255,255,.015)}
.rank-chg{font-size:.58rem;margin-left:3px}.rank-up{color:var(--green)}.rank-dn{color:var(--red)}.rank-eq{color:var(--muted)}
.team-nm{font-weight:500;font-size:.78rem}.team-pos{font-size:.6rem;color:var(--muted)}
.pts-big{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--accent)}
.f5-strip{display:flex;gap:2px;justify-content:flex-end}
.f5{width:15px;height:15px;border-radius:2px;font-size:.52rem;display:flex;align-items:center;justify-content:center;font-weight:600}

/* ═══ SCORERS ═══ */
.scorer-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.8rem .9rem;margin-bottom:.45rem;display:flex;align-items:center;gap:10px}
.scorer-rank{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--muted2);width:28px;text-align:center;flex-shrink:0}
.scorer-rank.top{color:var(--accent)}
.scorer-name{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scorer-team{font-size:.65rem;color:var(--muted);margin-top:1px}
.goal-bar-wrap{height:2px;background:var(--border);border-radius:1px;margin-top:5px}
.goal-bar{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--accent),var(--green))}
.goal-count{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1}
.goal-label{font-size:.55rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* ═══ SUSPENSIONS ═══ */
.susp-summary{display:flex;gap:7px;margin-bottom:1.1rem}
.susp-sum-card{flex:1;border-radius:9px;padding:.65rem;text-align:center}
.susp-sum-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;line-height:1}
.susp-sum-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.susp-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.8rem .9rem;margin-bottom:.45rem;display:flex;align-items:center;gap:10px}
.susp-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.susp-name{font-weight:600;font-size:.85rem}.susp-team{font-size:.64rem;color:var(--muted);margin-top:1px}
.susp-status{font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:4px;display:block;margin-bottom:2px}
.ss-susp{background:rgba(180,110,255,.1);color:var(--purple);border:1px solid rgba(180,110,255,.18)}
.ss-warn{background:rgba(255,171,0,.1);color:var(--amber);border:1px solid rgba(255,171,0,.18)}
.ss-ret{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.18)}
.susp-detail{font-size:.6rem;color:var(--muted)}
.cards-mini{display:flex;gap:2px;margin-top:3px;justify-content:flex-end}
.yc{width:9px;height:13px;background:var(--amber);border-radius:1px}
.rc{width:9px;height:13px;background:var(--red);border-radius:1px}
.divider{height:1px;background:var(--border);margin:1rem 0}
.sub-label{font-size:.64rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.65rem}




.score-hw{color:var(--green)}.score-aw{color:var(--red)}.score-d{color:var(--amber)}

/* API NOTICE */
.api-notice{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:9px;padding:.85rem 1rem;margin-bottom:1.1rem;display:flex;gap:.65rem;align-items:flex-start}
.api-notice p{font-size:.72rem;color:var(--muted);line-height:1.6}
.api-notice p strong{color:var(--accent)}

/* ERROR */
.err-box{background:#1a0505;border:1px solid #7f1d1d;border-radius:10px;padding:.9rem 1rem;margin-bottom:1.1rem}
.err-msg{color:#fca5a5;font-size:.78rem;line-height:1.6;margin-bottom:.4rem}
.btn-retry{background:#7f1d1d;border:none;border-radius:6px;color:#fca5a5;font-size:.7rem;padding:5px 11px;cursor:pointer;margin-top:3px}
.debug-out{background:#0a0a0f;border:1px solid #1c2333;border-radius:6px;padding:9px;font-size:.58rem;color:#4b5563;white-space:pre-wrap;word-break:break-all;max-height:250px;overflow-y:auto;margin-top:9px;line-height:1.5}

/* LOADING */
#loading{display:none;flex-direction:column;align-items:center;padding:3rem 1rem;text-align:center}
.spin{font-size:2.5rem;animation:spin 1.1s linear infinite;display:block;margin-bottom:1.1rem}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.load-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.1em;color:var(--accent);margin-bottom:.35rem}
.load-stage{color:var(--muted);font-size:.72rem;margin-bottom:.9rem;max-width:280px;line-height:1.6}
.prog-track{width:220px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.4rem}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;width:0%;transition:width .5s ease}
.prog-pct{color:#374151;font-size:.62rem}

.footer{text-align:center;color:#1e293b;font-size:.58rem;letter-spacing:.1em;padding-top:.5rem;text-transform:uppercase}

/* ═══ TRACKER ═══ */
.tracker-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.2rem}
.tracker-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem .6rem;text-align:center}
.tracker-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1}
.tracker-stat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.tracker-filter{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap}
.tracker-btn{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:.06em;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.tracker-btn.active{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.25);color:var(--accent)}
.tracker-pick{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem .95rem;margin-bottom:.5rem;display:flex;align-items:center;gap:10px}
.tracker-pick.success{border-color:rgba(0,230,118,.2);background:rgba(0,230,118,.04)}
.tracker-pick.failure{border-color:rgba(255,100,100,.2);background:rgba(255,100,100,.04)}
.tracker-pick.pending{border-color:rgba(255,171,0,.15);background:rgba(255,171,0,.03)}
.tracker-outcome{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.tracker-outcome.s{background:rgba(0,230,118,.15);color:var(--green)}
.tracker-outcome.f{background:rgba(255,100,100,.15);color:#f87171}
.tracker-outcome.p{background:rgba(255,171,0,.12);color:var(--amber)}
.tracker-info{flex:1;min-width:0}
.tracker-fixture{font-size:.84rem;font-weight:500}
.tracker-pick-name{font-size:.68rem;color:var(--accent);margin-top:1px}
.tracker-meta{font-size:.6rem;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.tracker-actions{display:flex;gap:5px;flex-shrink:0}
.tracker-action-btn{font-size:.6rem;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.tracker-action-btn.mark-win{color:var(--green);border-color:rgba(0,230,118,.3)}
.tracker-action-btn.mark-win:hover{background:rgba(0,230,118,.1)}
.tracker-action-btn.mark-loss{color:#f87171;border-color:rgba(255,100,100,.3)}
.tracker-action-btn.mark-loss:hover{background:rgba(255,100,100,.1)}
.tracker-action-btn.mark-undo{color:var(--muted);border-color:var(--border)}
.tracker-empty{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>

<!-- APP -->
<div id="app" style="display:flex;flex-direction:column;min-height:100vh">
  <header>
    <div><div class="logo">SC<span>OU</span>T</div><div class="hdr-sub" id="last-updated">—</div></div>
    <div class="hdr-right">
      <div class="live-pill"><span class="live-dot"></span>Live</div>
      <button class="btn-hdr btn-refresh" id="refresh-btn" onclick="runAnalysis(true)">↻ Refresh</button>
      
    </div>
  </header>

  <main>
    <div id="loading">
      <span class="spin">⚽</span>
      <div class="load-title" id="load-title">FETCHING LIVE DATA</div>
      <div class="load-stage" id="load-stage">Connecting to football-data.org…</div>
      <div class="prog-track"><div class="prog-bar" id="prog"></div></div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div id="results"></div>

    <!-- ═══ FIXTURES PAGE ═══ -->
    <div class="page" id="page-matchday">
      <div class="section-hdr"><div class="section-title">Fixtures</div><div class="section-sub">All Leagues</div><div class="section-badge" id="matchday-badge">Loading…</div></div>
      <div class="window-toggle" id="fixture-tabs" style="margin-bottom:1.1rem">
        <button class="fx-btn active" onclick="setFixtureWindow(3,this)">Next 3 Days</button>
        <button class="fx-btn" onclick="setFixtureWindow(7,this)">Next 7 Days</button>
        <button class="fx-btn" onclick="setFixtureWindow(14,this)">Next 14 Days</button>
      </div>
      <div id="matchday-content"><div style="text-align:center;padding:2rem;color:var(--muted);font-size:.8rem">Loading fixtures…</div></div>
    </div>

    <!-- ═══ FORM TABLE ═══ -->
    <div class="page" id="page-form">
      <div class="section-hdr"><div class="section-title">Form &amp; Goals</div><div class="section-sub">Last 8 Games</div><div class="section-badge">Live</div></div>
      <div class="window-toggle" style="margin-bottom:.75rem">
        <button class="win-btn active" id="form-view-btn" onclick="setFormView('form',this)">Form Table</button>
        <button class="win-btn" id="goals-view-btn" onclick="setFormView('goals',this)">Goals Analysis</button>
      </div>
      <div class="league-tabs" id="form-tabs"></div>
      <div id="form-content"><div style="text-align:center;padding:2rem;color:var(--muted);font-size:.8rem">Loading form tables…</div></div>
    </div>

    <!-- ═══ SCORERS ═══ -->
    <div class="page" id="page-scorers">
      <div class="section-hdr"><div class="section-title">Top Scorers</div><div class="section-sub">Golden Boot Races</div><div class="section-badge">Live</div></div>
      <div class="league-tabs" id="scorer-tabs"></div>
      <div id="scorer-content"><div style="text-align:center;padding:2rem;color:var(--muted);font-size:.8rem">Loading scorers…</div></div>
    </div>




</main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('picks',this)"><span class="nav-icon">🎯</span><span class="nav-label">Picks</span></button>
    <button class="nav-item" onclick="showPage('form',this)"><span class="nav-icon">📈</span><span class="nav-label">Form</span></button>
    <button class="nav-item" onclick="showPage('matchday',this)"><span class="nav-icon">📅</span><span class="nav-label">Fixtures</span></button>
    <button class="nav-item" onclick="showPage('scorers',this)"><span class="nav-icon">⚽</span><span class="nav-label">Scorers</span></button>

  </nav>
</div>

<script>
window.onerror = function(msg,src,line){ var el=document.getElementById("setup-err"); if(el)el.textContent="JS Error: "+msg+" (line "+line+")"; };

var VERCEL = "https://scout-three-mocha.vercel.app";
var WORKER = VERCEL; // kept for workerFetch compatibility
var LEAGUES = [
  {id:"PL", name:"Premier League",flag:"",flagCode:"gb-eng",country:"England",rel:3,playoff:0,euro:4},
  {id:"ELC",name:"Championship",  flag:"",flagCode:"gb-eng",country:"England",rel:3,playoff:4,euro:0},
  {id:"PD", name:"La Liga",       flag:"",flagCode:"es",country:"Spain",  rel:3,playoff:0,euro:5},
  {id:"BL1",name:"Bundesliga",    flag:"",flagCode:"de",country:"Germany",rel:2,playoff:1,euro:6},
  {id:"FL1",name:"Ligue 1",       flag:"",flagCode:"fr",country:"France", rel:2,playoff:1,euro:5},
  {id:"SA", name:"Serie A",       flag:"",flagCode:"it",country:"Italy",  rel:3,playoff:0,euro:7},
  {id:"DED",name:"Eredivisie",    flag:"",flagCode:"nl",country:"Netherlands",rel:3,playoff:2,euro:3},
  {id:"PPL",name:"Primeira Liga", flag:"",flagCode:"pt",country:"Portugal",rel:3,playoff:2,euro:3}
];
var CACHE_KEY="scout_v7_data", CACHE_TS="scout_v7_ts", CACHE_HRS=4;
var currentWindow=7, cachedAnalysis=null, lastDebug="";

function saveCache(a){try{localStorage.setItem(CACHE_KEY,JSON.stringify(a));localStorage.setItem(CACHE_TS,Date.now().toString());}catch(e){}}
function loadCache(){try{var t=localStorage.getItem(CACHE_TS),d=localStorage.getItem(CACHE_KEY);if(!t||!d)return null;if(Date.now()-parseInt(t)>CACHE_HRS*3600000)return null;return{data:JSON.parse(d),ts:parseInt(t)};}catch(e){return null;}}
function fmtTs(ts){var d=new Date(ts);return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})+" at "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
function setBanner(ts,cached){var el=document.getElementById("last-updated");if(el)el.textContent=(cached?"Cached · ":"Live · ")+"Last updated "+fmtTs(ts);}
function setP(pct,stage,title){var p=Math.min(Math.round(pct),100);document.getElementById("prog").style.width=p+"%";document.getElementById("prog-pct").textContent=p+"%";if(stage)document.getElementById("load-stage").textContent=stage;if(title)document.getElementById("load-title").textContent=title;}


function showError(msg){document.getElementById("loading").style.display="none";document.getElementById("results").innerHTML="<div class='err-box'><p class='err-msg'><strong>"+esc(msg)+"</strong></p><p style='color:#6b7280;font-size:.7rem;margin-bottom:4px'>Check both your Anthropic key and football-data.org key are entered — tap Keys.</p><button class='btn-retry' onclick='runAnalysis(true)'>Try again</button>"+(lastDebug?"<div class='debug-out'>"+esc(lastDebug)+"</div>":"")+"</div>";}

function showPage(id,el){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});
  if(id==="picks"){document.getElementById("results").style.display="block";}
  else{document.getElementById("results").style.display="none";}
  var pg=document.getElementById("page-"+id);
  if(pg)pg.classList.add("active");
  el.classList.add("active");
  window.scrollTo(0,0);
}

function setWindow(days){currentWindow=days;if(cachedAnalysis)renderPicks(cachedAnalysis);}

window.addEventListener("DOMContentLoaded",function(){
  runAnalysis(false);
});

function launch(){ runAnalysis(false); }

async function workerFetch(path){
  var r=await fetch(WORKER+"/api/football"+path);
  if(!r.ok){
    var errBody = await r.json().catch(function(){return{};});
    console.error("workerFetch error "+r.status+" for "+path, errBody);
    throw new Error("API error "+r.status+" for "+path);
  }
  return r.json();
}
async function getFixtures(lgId){
  var now=new Date(),end=new Date();end.setDate(now.getDate()+15);
  var fmt=function(d){return d.toISOString().split("T")[0];};
  // Try fetching matches - log raw response for debugging
  var data=await workerFetch("/competitions/"+lgId+"/matches?dateFrom="+fmt(now)+"&dateTo="+fmt(end));
  // Store raw response count for diagnostics
  if(!window._fixtureDebug) window._fixtureDebug={};
  window._fixtureDebug[lgId]="total:"+((data.matches||[]).length)+",filters:"+JSON.stringify(data.filters||{});
  var finished=["FINISHED","IN_PLAY","PAUSED","SUSPENDED","CANCELLED","POSTPONED"];
  return (data.matches||[])
    .filter(function(m){return finished.indexOf(m.status)===-1;})
    .map(function(m){return{home:(m.homeTeam&&(m.homeTeam.shortName||m.homeTeam.name))||"TBC",away:(m.awayTeam&&(m.awayTeam.shortName||m.awayTeam.name))||"TBC",date:new Date(m.utcDate).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}),time:new Date(m.utcDate).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),utc:m.utcDate,status:m.status};});
}
async function getStandings(lgId){
  var data=await workerFetch("/competitions/"+lgId+"/standings");
  var tbl=[];
  if(data.standings)for(var i=0;i<data.standings.length;i++){if(data.standings[i].type==="TOTAL"){tbl=data.standings[i].table||[];break;}}
  return tbl.map(function(t){return{pos:t.position,team:t.team.shortName||t.team.name,played:t.playedGames,won:t.won,drawn:t.draw,lost:t.lost,gf:t.goalsFor,ga:t.goalsAgainst,gd:t.goalDifference,pts:t.points,form:t.form||""};});
}

// Claude calls handled server-side

function parseLeagues(raw){
  // Strip markdown fences aggressively
  var txt=raw.replace(/```json/g,"").replace(/```/g,"").trim();
  var s=txt.indexOf("{"),e=txt.lastIndexOf("}");
  if(s===-1||e===-1)return[];
  var slice=txt.slice(s,e+1);
  // Fix common Claude JSON mistakes
  slice=slice.split("),").join("],").split('")').join('"]').replace(/,(\s*)(}|])/g,"$1$2");
  try{
    var parsed=JSON.parse(slice);
    return parsed.leagues||[];
  }catch(err){
    // JSON is valid but may be truncated - try to salvage complete league objects
    try{
      // Find all complete league objects by counting braces
      var leagues=[];
      var leagueStart=slice.indexOf('"league"');
      while(leagueStart>-1){
        // Find the enclosing { before this "league"
        var objStart=slice.lastIndexOf("{",leagueStart);
        if(objStart===-1)break;
        // Try increasingly large slices until we get a valid parse
        var depth=0,i=objStart,found=false;
        for(;i<slice.length;i++){
          if(slice[i]==="{")depth++;
          else if(slice[i]==="}"){depth--;if(depth===0){found=true;break;}}
        }
        if(found){
          try{
            var lg=JSON.parse(slice.slice(objStart,i+1));
            if(lg.league&&lg.picks)leagues.push(lg);
          }catch(e2){}
        }
        leagueStart=slice.indexOf('"league"',leagueStart+1);
      }
      return leagues;
    }catch(e3){return[];}
  }
}

async function runAnalysis(force){
  var btn=document.getElementById("refresh-btn");
  var loading=document.getElementById("loading");
  if(btn) btn.disabled=true;
  document.getElementById("results").innerHTML="";
  loading.style.display="flex";
  lastDebug="";

  try{
    setP(10,"Checking server cache…","LOADING DATA");

    // Try loading from server cache first
    var cacheRes = await fetch(VERCEL+"/api/data");

    if(cacheRes.status === 404 || force){
      // No cache yet or forced refresh — trigger server refresh
      setP(20,"Generating fresh analysis…","FETCHING LIVE DATA");
      var refreshRes = await fetch(VERCEL+"/api/refresh?secret="+encodeURIComponent(localStorage.getItem("scout_cron")||"scout2026secret"));

      if(!refreshRes.ok){
        var errData = await refreshRes.json().catch(function(){return{};});
        throw new Error(errData.error||"Refresh failed "+refreshRes.status);
      }
      setP(80,"Loading results…");
      cacheRes = await fetch(VERCEL+"/api/data");
    }

    if(!cacheRes.ok) throw new Error("Could not load data — try again shortly.");

    setP(90,"Rendering…","ALMOST DONE");
    var data = await cacheRes.json();

    if(!data.leagues||data.leagues.length===0) throw new Error("No analysis available yet.");

    // Merge leagueData into leagues for standings/fixtures
    if(data.leagueData){
      data.leagues.forEach(function(lg){
        var live = data.leagueData.filter(function(r){return r.name===lg.league;})[0];
        if(live){
          if(!lg.standings||!lg.standings.length){
            lg.standings = (live.standings||[]).map(function(row){
              // Already mapped (has pos as number and team as string)
              if(typeof row.team === "string") return row;
              // Raw football-data.org format - map to our format
              return {
                pos: row.position !== undefined ? row.position : row.pos,
                team: row.team ? (row.team.shortName||row.team.name||"") : "",
                played: row.playedGames !== undefined ? row.playedGames : (row.played||0),
                won: row.won||0,
                drawn: row.draw !== undefined ? row.draw : (row.drawn||0),
                lost: row.lost||0,
                gf: row.goalsFor !== undefined ? row.goalsFor : (row.gf||0),
                ga: row.goalsAgainst !== undefined ? row.goalsAgainst : (row.ga||0),
                gd: row.goalDifference !== undefined ? row.goalDifference : (row.gd||0),
                pts: row.points !== undefined ? row.points : (row.pts||0),
                form: row.form||""
              };
            });
          }
          lg.cfg = live;
          if(live.flag) lg.flag = live.flag;
          if(live.flagCode) lg.flagCode = live.flagCode;
        }
      });
    }

    cachedAnalysis = data;
    // Store leagueData globally for fixtures/form/scorers pages
    if(data.leagueData) window._leagueData = data.leagueData;
    setP(100);
    loading.style.display="none";
    renderPicks(data);
    var ts = data.updatedAt ? new Date(data.updatedAt) : new Date();
    setBanner(ts.getTime(), !force);

  }catch(err){
    if(btn) btn.disabled=false;
    loading.style.display="none";
    showError(err.message);
    return;
  }
  if(btn) btn.disabled=false;
}

function renderPicks(a){
  var res=document.getElementById("results");
  res.style.display="block";
  var max=currentWindow===7?3:5;
  var total=(a.leagues||[]).reduce(function(n,l){return n+Math.min(Array.isArray(l.picks)?l.picks.length:0,max);},0);
  // Tab toggle
  if(!window._picksTab) window._picksTab = "picks";
  var html="<div class='window-toggle' style='margin-bottom:.9rem'>";
  html+="<button class='win-btn"+(window._picksTab==="picks"?" active":"")+"' onclick='switchPicksTab(\"picks\")'>Picks</button>";
  html+="<button class='win-btn"+(window._picksTab==="tracker"?" active":"")+"' onclick='switchPicksTab(\"tracker\")'>Tracker</button>";
  html+="</div>";

  if(window._picksTab==="tracker"){
    renderTrackerTab(html, res);
    return;
  }

  html+="<div class='stats-row'><div class='stat-card'><div class='stat-label'>Leagues</div><div class='stat-val'>"+(a.leagues||[]).length+"</div></div><div class='stat-card'><div class='stat-label'>Picks</div><div class='stat-val c-accent'>"+total+"</div></div><div class='stat-card'><div class='stat-label'>Window</div><div class='stat-val'>"+(currentWindow===7?"7D":"14D")+"</div></div></div>";
  html+="<div class='window-toggle'><button class='win-btn"+(currentWindow===7?" active":"")+"' onclick='setWindow(7)'>7 DAYS · TOP 3</button><button class='win-btn"+(currentWindow===14?" active":"")+"' onclick='setWindow(14)'>14 DAYS · TOP 5</button></div>";
  html+="<div style='background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:10px;padding:.85rem 1rem;margin-bottom:1.1rem;font-size:.72rem;color:var(--muted);line-height:1.7'>" +
    "<span style='color:var(--accent);font-weight:600;font-family:Bebas Neue,sans-serif;letter-spacing:.06em;font-size:.85rem'>How picks work</span><br>" +
    "Each league shows the top upcoming fixtures ranked by scoring likelihood. The <span style='color:var(--text)'>primary pick</span> is always one team to score, selected using real form data and expected goals (xG). " +
    "Below each primary pick is a <span style='color:var(--purple)'>Higher Risk Bet Builder</span> — a combination of additional markets (Win, Over 1.5 Goals, BTTS) that, when combined, offer higher potential returns but carry greater risk. Use these as guidance, not guarantees." +
    "</div>";

  var now7 = new Date();
  var windowEnd = new Date(now7); windowEnd.setDate(now7.getDate()+currentWindow);

  (a.leagues||[]).forEach(function(lg,li){
    var allPicks = Array.isArray(lg.picks)?lg.picks:[];
    // Sort by date ascending so nearest fixtures appear first
    allPicks.sort(function(a,b){
      var da = a.utc ? new Date(a.utc) : new Date(a.date+" "+now7.getFullYear());
      var db = b.utc ? new Date(b.utc) : new Date(b.date+" "+now7.getFullYear());
      return (isNaN(da)?Infinity:da) - (isNaN(db)?Infinity:db);
    });
    // Take the first N picks by date — no date window filter needed since
    // server already selects the best upcoming fixtures within 14 days
    var picks = allPicks.slice(0, max);
    var cfg=lg.cfg||{};
    html+="<div class='league-section'><div class='league-hdr' onclick='toggleLg("+li+")'><span class='lg-flag'>"+renderFlag(lg.flag||"",lg.flagCode)+"</span><span class='lg-name'>"+(lg.league||"")+"</span><span class='lg-chev' id='lc-"+li+"'>▲</span></div>";
    if(lg.context){} // context removed from display

    // Standings table
    if(lg.standings&&lg.standings.length>0){
      var n=lg.standings.length;
      html+="<div class='tbl-toggle' id='ttog-"+li+"' onclick='toggleTbl("+li+")'>▼ LEAGUE TABLE ("+n+" teams)</div><div class='standings-wrap' id='tbl-"+li+"'><table class='standings-tbl'><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th></tr></thead><tbody>";
      lg.standings.forEach(function(row,ri){
        var zone="";
        if(cfg.rel&&row.pos>n-cfg.rel)zone="zone-rel";
        else if(cfg.playoff&&row.pos>2&&row.pos<=2+cfg.playoff)zone="zone-playoff";
        else if(row.pos<=2)zone="zone-promo";
        else if(cfg.euro&&row.pos<=2+(cfg.playoff||0)+cfg.euro)zone="zone-euro";
        var sep=(cfg.rel&&row.pos===n-cfg.rel+1)?" zone-sep":"";
        var formHtml="";
        if(row.form){row.form.split(",").slice(0,5).forEach(function(r){var fc=r==="W"?"s-fw":r==="D"?"s-fd":"s-fl";formHtml+="<span class='"+fc+"'>"+r+"</span>";});}
        html+="<tr class='"+zone+sep+"'><td class='s-pos'>"+row.pos+"</td><td class='s-team'>"+esc(row.team)+"</td><td>"+row.played+"</td><td>"+row.won+"</td><td>"+row.drawn+"</td><td>"+row.lost+"</td><td>"+row.gf+"</td><td>"+row.ga+"</td><td>"+(row.gd>=0?"+":"")+row.gd+"</td><td class='s-pts'>"+row.pts+"</td><td class='s-form'>"+formHtml+"</td></tr>";
      });
      html+="</tbody></table><div class='tbl-legend'>"+(cfg.rel?"<div class='tbl-legend-item'><div class='tbl-legend-dot' style='background:#ef4444'></div>Relegation</div>":"")+((cfg.playoff||0)>0?"<div class='tbl-legend-item'><div class='tbl-legend-dot' style='background:#8b5cf6'></div>Playoff</div>":"")+"<div class='tbl-legend-item'><div class='tbl-legend-dot' style='background:#3b82f6'></div>Promotion</div>"+((cfg.euro||0)>0?"<div class='tbl-legend-item'><div class='tbl-legend-dot' style='background:#10b981'></div>Europe</div>":"")+"</div></div>";
    }

    html+="<div id='lb-"+li+"'>";
    if(picks.length===0)html+="<p style='color:var(--muted);font-size:.72rem;padding:.4rem .2rem'>No picks for this league — try refreshing.</p>";

    picks.forEach(function(pick,pi){
      var bid="pb-"+li+"-"+pi,cid="pc-"+li+"-"+pi,open=false;
      var pr=pick.primary||{};
      var conf=pr.confidence||"Medium";

      // Pick card with fixture header
      html+="<div class='pick-card'>";
      html+="<div class='pick-hdr' onclick='togglePick(\""+bid+"\",\""+cid+"\")'>";
      html+="<div class='pick-num'>"+(pi+1)+"</div>";
      html+="<div class='pick-info'>";
      html+="<div class='matchup'>"+esc(pick.home||"")+" <span style='color:var(--muted)'>vs</span> "+esc(pick.away||"")+"</div>";
      html+="<div class='kickoff'>"+esc(pick.date||"")+" &middot; "+esc(pick.time||"")+"</div>";
      html+="</div>";
      html+="<div style='display:flex;flex-direction:column;align-items:flex-end;gap:2px'>";

      html+="<span class='conf "+confClass+"'>"+conf+"</span>";
      html+="<div class='pick-chev' id='"+cid+"'>"+(open?"▲":"▼")+"</div>";
      html+="</div></div>";
      html+="<div class='pick-body' id='"+bid+"' style='display:"+(open?"block":"none")+"'>";

      html+="<div class='primary-pick-name'>&#127919; "+esc(pr.pick||"")+" <span class='xg-badge'>xG "+(pr.xg?parseFloat(pr.xg).toFixed(2):"—")+"</span></div>";
      if(pr.reason) html+="<p style='font-size:.74rem;color:#7ab0c8;line-height:1.7;margin-top:8px;border-top:1px solid rgba(0,212,255,.08);padding-top:8px'>"+esc(pr.reason)+"</p>";
      html+="</div>";

      // Form strip
      var formHtml="";
      if(pick.form&&pick.form.length){
        formHtml="<div class='form-label'>Last 5 — "+esc(pr.pick||"pick team")+"</div><div class='form-strip'>";
        pick.form.forEach(function(g){
          var rc=g.result==="W"?"fr-w":g.result==="D"?"fr-d":"fr-l";
          formHtml+="<div class='fg'><div class='fr "+rc+"'>"+esc(g.result||"?")+"</div><div class='fg-txt'>"+esc(g.score||"")+"</div><div class='fg-txt'>xG "+(g.xg!=null?parseFloat(g.xg).toFixed(1):"?")+"</div><div class='fg-txt'>&#9917; "+(g.actual!=null?g.actual:"?")+"</div></div>";
        });
        formHtml+="</div>";
      }

      var buildersHtml=""; // individual builder grid removed - shown in combo only

      // Combo - show each pick with its individual odds, plus combined odds
      var comboHtml="";
      if(pick.combo&&pick.builders){
        var c=pick.combo;
        var comboPicks=(c.picks||[]).filter(function(p){
          return (p||"").toLowerCase().indexOf("to score")===-1;
        });
        if(comboPicks.length){
          // Look up individual odds for each combo pick from builders
          var comboOdds = c.odds&&c.odds!=="CALCULATE"?c.odds:"";
          comboHtml="<div class='combo-section'>";
          comboHtml+="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:7px'>";
          comboHtml+="<div class='combo-label'>&#9889; Higher Risk Bet Builder</div>";
          if(comboOdds) comboHtml+="<span style='font-family:DM Mono,monospace;font-size:.95rem;color:var(--purple);font-weight:600'>"+esc(comboOdds)+"</span>";
          comboHtml+="</div>";
          comboHtml+="<div style='background:rgba(180,110,255,.06);border-radius:6px;padding:8px 10px'>";
          comboPicks.forEach(function(p,pi){
            var pickTeam = (pr.pick||"").replace(" to Score","").trim();
            var pickLabel = p;
            // Make goals market team-specific if not already
            var goalsMatch = pickLabel.match(/Over (0\.5|1\.5) Goals/i);
            if(goalsMatch && pickLabel.toLowerCase().indexOf(pickTeam.toLowerCase().split(" ")[0])===-1){
              pickLabel = pickTeam + " Over " + goalsMatch[1] + " Goals";
            }
            // "Win / Draw" → "Double Chance" for display clarity
            pickLabel = pickLabel.replace(/Win \/ Draw/gi, "Double Chance");
            if(pi>0) comboHtml+="<div style='height:1px;background:rgba(180,110,255,.08);margin:4px 0'></div>";
            comboHtml+="<div style='display:flex;align-items:center;padding:4px 0'>";
            comboHtml+="<span style='color:var(--purple);font-size:.6rem;margin-right:8px'>&#9632;</span>";
            comboHtml+="<span style='font-size:.8rem;color:var(--text);font-weight:500'>"+esc(pickLabel)+"</span>";
            comboHtml+="</div>";
          });
          comboHtml+="</div>";
          comboHtml+="</div>";
        }
      }
      html+=formHtml+comboHtml;
      if(pick.tags&&pick.tags.length)html+="<div class='tags'>"+pick.tags.map(function(t){return"<span class='tag'>"+esc(t)+"</span>";}).join("")+"</div>";
      html+="</div></div>"; // close pick-body and pick-card
    });
    html+="</div></div>";
  });

  // Inline tracker summary — sync current picks then show stats
  html+="<p class='footer'>Scout &middot; football-data.org + Claude &middot; Personal use only</p>";
  res.innerHTML=html;
}

function renderTrackerTab(html, res) {
  // Sync picks first
  trackerSyncFromAnalysis();
  var trackerPicks = trackerLoad();
  var highPicks = trackerPicks.filter(function(p){ return (p.confidence||"").toLowerCase()==="high"; });
  highPicks.sort(function(a,b){ return new Date(b.addedAt)-new Date(a.addedAt); });

  var total=highPicks.length;
  var wins=highPicks.filter(function(p){return p.outcome==="success";}).length;
  var losses=highPicks.filter(function(p){return p.outcome==="failure";}).length;
  var pending=highPicks.filter(function(p){return p.outcome==="pending";}).length;
  var settled=wins+losses;
  var rate=settled>0?Math.round((wins/settled)*100):null;
  var rateColor=rate===null?"var(--muted)":rate>=65?"var(--green)":rate>=50?"var(--amber)":"#f87171";

  // Info note
  html+="<div style='background:rgba(0,230,118,.04);border:1px solid rgba(0,230,118,.12);border-radius:8px;padding:.65rem .85rem;margin-bottom:.9rem;font-size:.68rem;color:var(--muted);line-height:1.6'>";
  html+="<span style='color:var(--green);font-weight:600'>High confidence picks only.</span> Results resolved automatically once the fixture finishes.";
  html+="</div>";

  // Stats
  html+="<div class='tracker-stats'>";
  html+="<div class='tracker-stat'><div class='tracker-stat-val' style='color:var(--accent)'>"+total+"</div><div class='tracker-stat-lbl'>Total</div></div>";
  html+="<div class='tracker-stat'><div class='tracker-stat-val' style='color:var(--green)'>"+wins+"</div><div class='tracker-stat-lbl'>Won</div></div>";
  html+="<div class='tracker-stat'><div class='tracker-stat-val' style='color:#f87171'>"+losses+"</div><div class='tracker-stat-lbl'>Lost</div></div>";
  html+="<div class='tracker-stat'><div class='tracker-stat-val' style='color:"+rateColor+"'>"+(rate!==null?rate+"%":"—")+"</div><div class='tracker-stat-lbl'>Win Rate</div></div>";
  html+="</div>";

  // Filter buttons
  if(!window._tFilter) window._tFilter="all";
  html+="<div class='tracker-filter'>";
  html+="<button class='tracker-btn"+(window._tFilter==="all"?" active":"")+"' onclick='switchTrackerFilter(\"all\")'>All ("+total+")</button>";
  html+="<button class='tracker-btn"+(window._tFilter==="pending"?" active":"")+"' onclick='switchTrackerFilter(\"pending\")'>Pending ("+pending+")</button>";
  html+="<button class='tracker-btn"+(window._tFilter==="success"?" active":"")+"' onclick='switchTrackerFilter(\"success\")'>Won ("+wins+")</button>";
  html+="<button class='tracker-btn"+(window._tFilter==="failure"?" active":"")+"' onclick='switchTrackerFilter(\"failure\")'>Lost ("+losses+")</button>";
  html+="</div>";

  // Sync button
  html+="<div style='display:flex;justify-content:flex-end;margin-bottom:.8rem'>";
  html+="<button onclick='trackerSyncFromAnalysis();setTimeout(function(){renderPicks(cachedAnalysis);},0)' style='font-size:.6rem;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer'>↻ Sync</button>";
  html+="</div>";

  // Picks list
  var filtered=window._tFilter==="all"?highPicks:highPicks.filter(function(p){return p.outcome===window._tFilter;});
  if(!filtered.length){
    html+="<div class='tracker-empty'>"+(total===0?"No High picks tracked yet — visit Picks page to sync.":"No "+window._tFilter+" picks.")+"</div>";
  } else {
    filtered.forEach(function(p){
      var oc=p.outcome;
      var ocClass=oc==="success"?"success":oc==="failure"?"failure":"pending";
      var icon=oc==="success"?"✓":oc==="failure"?"✗":"?";
      var iconClass=oc==="success"?"s":oc==="failure"?"f":"p";
      html+="<div class='tracker-pick "+ocClass+"'>";
      html+="<div class='tracker-outcome "+iconClass+"'>"+icon+"</div>";
      html+="<div class='tracker-info'>";
      html+="<div class='tracker-fixture'>"+esc(p.home)+" <span style='color:var(--muted)'>vs</span> "+esc(p.away)+"</div>";
      html+="<div class='tracker-pick-name'>"+esc(p.pick||"")+"</div>";
      html+="<div class='tracker-meta'>"+esc(p.league)+" · "+esc(p.date)+" "+esc(p.time)+(p.xg?" · xG "+parseFloat(p.xg).toFixed(2):"")+(p.score?" · "+esc(p.score):"")+(p.resolvedAt?" · Auto":"")+"</div>";
      html+="</div>";
      if(p.outcome!=="pending"&&!p.resolvedAt){
        html+="<div class='tracker-actions'><button class='tracker-action-btn mark-undo' data-id='"+esc(p.id)+"' data-outcome='pending' onclick='trackerSetOutcomeBtn(this)'>↩</button></div>";
      } else if(p.outcome==="pending"){
        html+="<div class='tracker-actions'><span style='font-size:.6rem;color:var(--amber)'>Pending</span></div>";
      } else {
        html+="<div class='tracker-actions'><span style='font-size:.58rem;color:var(--muted)'>Auto ↻</span></div>";
      }
      html+="</div>";
    });
  }

  html+="<p class='footer'>Scout &middot; football-data.org + Claude &middot; Personal use only</p>";
  res.innerHTML=html;

  // Trigger auto-resolve async in background — no re-render on complete
  trackerAutoResolve();
}

// Render a flag — uses image from flagcdn.com which works on all OS/browsers

function renderFlag(flag, flagCode, size) {

// ── FIXTURES PAGE ────────────────────────────────────────────────────────────
var fixtureCache = {};    // keyed by days offset
var fixtureDays = 3;      // current window: 3=3days, 7=7days, 14=14days

function setFixtureWindow(days, btn) {
  fixtureDays = days;
  document.querySelectorAll("#fixture-tabs .fx-btn").forEach(function(b){b.classList.remove("active");});
  if(btn) btn.classList.add("active");
  loadMatchday(true);
}

async function loadMatchday(force) {
  // Always reload when switching tabs - don't use stale cache
  if(fixtureCache[fixtureDays] && !force) {
    document.getElementById("matchday-content").innerHTML = fixtureCache[fixtureDays];
    return;
  }
  var contentEl = document.getElementById("matchday-content");
  var badge = document.getElementById("matchday-badge");
  contentEl.innerHTML = "<div style='text-align:center;padding:2rem;color:var(--muted);font-size:.8rem'>Loading fixtures…</div>";

  try {
    var now = new Date();
    var fmt = function(d){return d.toISOString().split("T")[0];};

    // Date range: always from now to N days ahead
    var dateFrom = new Date(now);
    var dateTo = new Date(now);
    dateTo.setDate(now.getDate() + fixtureDays);

    var allMatches = [];
    // Use cached leagueData if available
    var leagueDataSrc = window._leagueData || [];
    if(leagueDataSrc.length > 0){
      leagueDataSrc.forEach(function(lg){
        (lg.fixtures||[]).forEach(function(f){
          var utc = new Date(f.utc);
          if(utc >= dateFrom && utc < dateTo){
            allMatches.push({
              home: f.home,
              away: f.away,
              time: f.time,
              utc: f.utc,
              league: lg.name,
              flag: lg.flag,
              status: f.status||"TIMED"
            });
          }
        });
      });
    } else {
      await Promise.all(LEAGUES.map(async function(lg){
        try{
          var data = await workerFetch("/competitions/"+lg.id+"/matches?dateFrom="+fmt(dateFrom)+"&dateTo="+fmt(dateTo));
          (data.matches||[]).forEach(function(m){
            allMatches.push({
              home: (m.homeTeam&&(m.homeTeam.shortName||m.homeTeam.name))||"TBC",
              away: (m.awayTeam&&(m.awayTeam.shortName||m.awayTeam.name))||"TBC",
              time: new Date(m.utcDate).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),
              utc: m.utcDate,
              league: lg.name,
              flag: lg.flag,
              status: m.status
            });
          });
        }catch(e){}
      }));
    }

    allMatches.sort(function(a,b){return new Date(a.utc)-new Date(b.utc);});

    if(badge) badge.textContent = allMatches.length+" games";

    // Group by league (LEAGUES config order), date shown inside each tile
    var leagueGroups = {};
    allMatches.forEach(function(m){
      if(!leagueGroups[m.league]) leagueGroups[m.league] = [];
      leagueGroups[m.league].push(m);
    });

    var html = "";
    if(!allMatches.length) {
      html = "<p style='color:var(--muted);font-size:.8rem;padding:1rem 0'>No fixtures in this window.</p>";
    } else {
      LEAGUES.forEach(function(lgObj){
        var lgMatches = leagueGroups[lgObj.name];
        if(!lgMatches || !lgMatches.length) return;
        var lgId = "fxlg-"+lgObj.name.replace(/\s/g,"");
        html += "<div style='margin-bottom:.75rem'>";
        html += "<div id='" + lgId + "-hdr' onclick='toggleFxLeague(\""+lgId+"\")' style='display:flex;align-items:center;gap:6px;padding:5px 0;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);margin-bottom:5px'>" +
          renderFlag(lgObj.flag, lgObj.flagCode) +
          "<span style='font-family:Bebas Neue,sans-serif;font-size:.95rem;letter-spacing:.06em;color:var(--text)'>" + esc(lgObj.name) + "</span>" +
          "<span style='font-size:.62rem;color:var(--muted);background:var(--card2);padding:1px 7px;border-radius:10px;margin-left:2px'>" + lgMatches.length + " games</span>" +
          "<span id='" + lgId + "-chev' style='margin-left:auto;color:var(--muted);font-size:.6rem'>&#9650;</span></div>";
        html += "<div id='"+lgId+"' style='display:block'><div class='fixture-grid'>";
        lgMatches.forEach(function(m){
          var isLive = m.status==="IN_PLAY"||m.status==="PAUSED";
          var isFinished = m.status==="FINISHED";
          var mDate = new Date(m.utc);
          var isToday = mDate.toDateString()===now.toDateString();
          var isTomorrow = mDate.toDateString()===new Date(now.getTime()+86400000).toDateString();
          var dateLabel = isToday?"Today":isTomorrow?"Tomorrow":mDate.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
          html += "<div class='match-card'>" +
            "<div class='match-fixture'>"+esc(m.home)+" <span class='match-vs'>vs</span> "+esc(m.away)+"</div>" +
            "<div class='match-meta'>" +
            "<span class='match-time' style='"+(isLive?"color:var(--red)":"")+"'>"+(isLive?"\uD83D\uDD34 LIVE":isFinished?"FT":m.time)+"</span>" +
            "<span style='font-size:.6rem;color:var(--muted)'>"+esc(dateLabel)+"</span>" +
            "</div></div>";
        });
        html += "</div></div></div>";
      });
    }

    // Only cache if we got real data (don't cache "no fixtures" messages)
    if(allMatches.length > 0) fixtureCache[fixtureDays] = html;
    contentEl.innerHTML = html;
  } catch(e) {
    contentEl.innerHTML = "<p style='color:#fca5a5;font-size:.8rem'>Failed to load: "+esc(e.message)+"</p>";
  }
}

var formLoaded = false;
var formData = {};
var formLeagueIdx = 0;
var formView = "form"; // "form" or "goals"

async function loadForm() {
  if(formLoaded) return;
  formLoaded = true;
  var tabsEl = document.getElementById("form-tabs");
  var contentEl = document.getElementById("form-content");

  tabsEl.innerHTML = LEAGUES.map(function(lg,i){
    return "<div class='league-tab"+(i===0?" active":"")+"' onclick='showFormLeague("+i+")'>" + renderFlag(lg.flag,lg.flagCode,16) + " "+lg.name+"</div>";
  }).join("");
  contentEl.innerHTML = "<div style='text-align:center;padding:2rem;color:var(--muted);font-size:.8rem'>Loading form data…</div>";

  var now = new Date();
  var past = new Date(now); past.setDate(now.getDate()-60);
  var fmt = function(d){return d.toISOString().split("T")[0];};

  // Run all fetches in parallel but don't block the UI — use .then() not await
  Promise.all(LEAGUES.map(function(lg, fi){
    return Promise.all([
      workerFetch("/competitions/"+lg.id+"/standings"),
      workerFetch("/competitions/"+lg.id+"/matches?status=FINISHED&dateFrom="+fmt(past)+"&dateTo="+fmt(now)+"&limit=100")
    ]).then(function(results){
      var stData = results[0], mData = results[1];
      var tbl=[];
      if(stData.standings){for(var j=0;j<stData.standings.length;j++){if(stData.standings[j].type==="TOTAL"){tbl=stData.standings[j].table||[];break;}}}
      var teamScores={};
      (mData.matches||[]).forEach(function(m){
        var homeId=m.homeTeam&&m.homeTeam.id, awayId=m.awayTeam&&m.awayTeam.id;
        var hg=m.score&&m.score.fullTime&&(m.score.fullTime.home!==undefined?m.score.fullTime.home:m.score.fullTime.homeTeam);
        var ag=m.score&&m.score.fullTime&&(m.score.fullTime.away!==undefined?m.score.fullTime.away:m.score.fullTime.awayTeam);
        if(hg===null||hg===undefined||ag===null||ag===undefined) return;
        var hr=hg>ag?"W":hg<ag?"L":"D", ar=ag>hg?"W":ag<hg?"L":"D";
        var opp=function(t){return t&&(t.shortName||t.name)||"?";};
        if(homeId){if(!teamScores[homeId])teamScores[homeId]=[];teamScores[homeId].push({r:hr,s:hg+"-"+ag,opp:opp(m.awayTeam),v:"H"});}
        if(awayId){if(!teamScores[awayId])teamScores[awayId]=[];teamScores[awayId].push({r:ar,s:ag+"-"+hg,opp:opp(m.homeTeam),v:"A"});}
      });
      tbl.forEach(function(row){
        var tid=row.team&&row.team.id;
        var allGames=tid&&teamScores[tid]?teamScores[tid]:[];
        var last15=allGames.slice(-15).reverse();
        var last8=allGames.slice(-8).reverse();
        var last5=allGames.slice(-5).reverse();
        row.calcForm=last5.map(function(g){return g.r;});
        row.formGames=last5;
        row.last8Games=last8;
        row.last15Games=last15;
      });
      formData[fi]=tbl;
    }).catch(function(e){
      formData[fi]=[];
      console.error("Form load error for "+lg.name+":", e.message);
    });
  })).then(function(){
    showFormLeague(formLeagueIdx||0);
  });
}


function showGoalsAnalysis(idx) {
  var contentEl = document.getElementById("form-content");
  var tbl = formData[idx];
  if(!tbl||!tbl.length){ contentEl.innerHTML = "<p style='color:var(--muted);font-size:.8rem;padding:1rem 0'>No data available.</p>"; return; }

  // Get upcoming fixtures and standings for this league
  var leagueSrc = (window._leagueData||[]).find(function(l){ return l.name===LEAGUES[idx].name; });
  var upcomingFixtures = leagueSrc ? (leagueSrc.fixtures||[]) : [];

  // Build team stats map from last8Games
  var statsMap = {};
  tbl.forEach(function(row){
    var name = (row.team&&(row.team.shortName||row.team.name))||"";
    var games = row.last8Games||row.formGames||[];
    var hScored=0,hConc=0,hGames=0,aScored=0,aConc=0,aGames=0;
    var scoringCount=0,ftsCount=0,csCount=0,bttsCount=0,o15Count=0,o25Count=0;
    var scoringStreak=0,streakDone=false;
    games.forEach(function(g){
      var parts=(g.s||"0-0").split("-");
      var gs=parseInt(parts[0])||0, gc=parseInt(parts[1])||0;
      var tot=gs+gc;
      if(g.v==="H"){hScored+=gs;hConc+=gc;hGames++;}
      else{aScored+=gs;aConc+=gc;aGames++;}
      if(gs>0) scoringCount++;
      if(gs===0) ftsCount++;
      if(gc===0) csCount++;
      if(gs>0&&gc>0) bttsCount++;
      if(tot>1) o15Count++;
      if(tot>2) o25Count++;
      if(!streakDone){if(gs>0)scoringStreak++;else streakDone=true;}
    });
    var total=games.length||1;
    statsMap[name.toLowerCase()] = {
      name: name,
      pos: row.position||row.pos||0,
      hScrAvg: hGames?(hScored/hGames):null,
      aScrAvg: aGames?(aScored/aGames):null,
      hConcAvg: hGames?(hConc/hGames):null,
      aConcAvg: aGames?(aConc/aGames):null,
      scoringPct: scoringCount/total,
      ftsPct: ftsCount/total,
      csPct: csCount/total,
      bttsPct: bttsCount/total,
      o15Pct: o15Count/total,
      o25Pct: o25Count/total,
      scoringStreak: scoringStreak,
      games: total
    };
  });

  // Helper: fuzzy match team name to statsMap key
  function findStats(name) {
    if(!name) return null;
    var nl = name.toLowerCase();
    if(statsMap[nl]) return statsMap[nl];
    var keys = Object.keys(statsMap);
    for(var i=0;i<keys.length;i++){
      if(keys[i].indexOf(nl.split(" ")[0])!==-1||nl.indexOf(keys[i].split(" ")[0])!==-1)
        return statsMap[keys[i]];
    }
    return null;
  }

  // Build fixture rows - one row per upcoming fixture, both teams shown
  var now = new Date();
  var fixtures = upcomingFixtures.filter(function(f){
    return new Date(f.utc) > now;
  }).slice(0, 20);

  // Helper: colour by value
  function pct(val) {
    var p = Math.round(val*100);
    var color = p>=70?"var(--green)":p>=50?"#a3e635":p>=35?"var(--amber)":"var(--red)";
    return "<span style='font-family:DM Mono,monospace;font-size:.72rem;color:"+color+"'>"+p+"%</span>";
  }
  function na() { return "<span style='color:var(--muted);font-size:.7rem'>—</span>"; }

  // ── Realistic probability model ──────────────────────────────────────────
  // League baseline rates (sensible priors for top European leagues)
  var LEAGUE_SCR   = 0.72;  // ~72% of teams score in a given game
  var LEAGUE_CS    = 0.28;  // ~28% of games end in a clean sheet
  var LEAGUE_BTTS  = 0.52;  // ~52% of games see both teams score
  var LEAGUE_O15   = 0.75;  // ~75% of games have over 1.5 goals
  var LEAGUE_O25   = 0.52;  // ~52% of games have over 2.5 goals
  var BLEND = 0.35;         // How much to pull toward league average (regression)

  // Blend a raw rate toward the league baseline to prevent extremes
  function blend(raw, baseline) {
    return raw * (1 - BLEND) + baseline * BLEND;
  }

  // Sigmoid-style soft cap: keeps values in a realistic range
  // Maps any probability away from 0% and 100% toward [0.12, 0.88]
  function softCap(p) {
    var min = 0.12, max = 0.88;
    return min + (max - min) * p;
  }

  // Team to Score: attacker's blended scoring rate vs defender's blended CS rate
  // Opponent's clean sheet rate reduces the probability significantly
  function calcToScore(attScrPct, defCsPct) {
    var att = blend(attScrPct, LEAGUE_SCR);
    var def = blend(defCsPct, LEAGUE_CS);
    // Attacker scores unless keeper keeps a clean sheet
    var raw = att * (1 - def) + att * def * 0.35;
    return softCap(raw);
  }

  // Expected total goals using both teams' avg scored/conceded
  // Then convert to O1.5 and O2.5 using Poisson approximation
  function poissonProb(lambda, k) {
    // P(X <= k) using Poisson CDF approximation
    var p = Math.exp(-lambda), sum = p;
    for(var i=1;i<=k;i++){ p *= lambda/i; sum += p; }
    return sum;
  }
  function calcGoalProbs(hScrAvg, hConcAvg, aScrAvg, aConcAvg) {
    // Expected goals for each team, blended with league avg (1.35 per team)
    var LEAGUE_AVG = 1.35;
    var hxg = blend( ((hScrAvg||LEAGUE_AVG) + (aConcAvg||LEAGUE_AVG)) / 2, LEAGUE_AVG );
    var axg = blend( ((aScrAvg||LEAGUE_AVG) + (hConcAvg||LEAGUE_AVG)) / 2, LEAGUE_AVG );
    var totalXG = hxg + axg;
    // P(over 1.5) = 1 - P(0 goals) - P(1 goal)
    var o15 = softCap(1 - poissonProb(totalXG, 1));
    // P(over 2.5) = 1 - P(0) - P(1) - P(2)
    var o25 = softCap(1 - poissonProb(totalXG, 2));
    return { o15: o15, o25: o25 };
  }

  // BTTS: both teams need to score independently
  function calcBtts(homeScrPct, awayScrPct, homeCsPct, awayCsPct) {
    var hScores = calcToScore(homeScrPct, awayCsPct);
    var aScores = calcToScore(awayScrPct, homeCsPct);
    return softCap(hScores * aScores);
  }

  // Colour coded pct
  function cpct(val) {
    var p = Math.round(val*100);
    var color = p>=70?"var(--green)":p>=55?"#a3e635":p>=40?"var(--amber)":"var(--red)";
    return "<span style='font-family:DM Mono,monospace;font-size:.78rem;font-weight:600;color:"+color+"'>"+p+"%</span>";
  }

  if(!fixtures.length){
    contentEl.innerHTML = "<p style='color:var(--muted);font-size:.8rem;padding:1rem 0'>No upcoming fixtures found.</p>";
    return;
  }

  var th = "style='padding:6px 6px;color:var(--muted);font-size:.58rem;font-weight:600;letter-spacing:.06em;white-space:nowrap;border-bottom:2px solid var(--border)'";
  var html = "<div style='overflow-x:auto'><table style='width:100%;border-collapse:collapse;font-size:.75rem'>";
  html += "<thead><tr>";
  html += "<th "+th+" style='text-align:left;padding:6px 6px'>FIXTURE</th>";
  html += "<th "+th+">DATE</th>";
  html += "<th "+th+" title='Probability home team scores'>H SCR</th>";
  html += "<th "+th+" title='Probability away team scores'>A SCR</th>";
  html += "<th "+th+" title='Both teams to score probability'>BTTS</th>";
  html += "<th "+th+" title='Over 1.5 goals probability'>O1.5</th>";
  html += "<th "+th+" title='Over 2.5 goals probability'>O2.5</th>";
  html += "<th "+th+" title='Home scoring streak'>H🔥</th>";
  html += "<th "+th+" title='Away scoring streak'>A🔥</th>";
  html += "</tr></thead><tbody>";

  fixtures.forEach(function(f, i){
    var hs = findStats(f.home);
    var as = findStats(f.away);
    var rowBg = i%2===0?"":"background:rgba(255,255,255,.02)";
    var td = "style='padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle'";

    // Cross-referenced probabilities using realistic model
    var hScr = (hs&&as) ? calcToScore(hs.scoringPct, as.csPct) : null;
    var aScr = (hs&&as) ? calcToScore(as.scoringPct, hs.csPct) : null;
    var btts = (hs&&as) ? calcBtts(hs.scoringPct, as.scoringPct, hs.csPct, as.csPct) : null;
    var gp   = (hs&&as) ? calcGoalProbs(
      hs.hScrAvg || hs.scoringPct * 1.5,
      hs.hConcAvg || as.scoringPct * 1.5,
      as.aScrAvg || as.scoringPct * 1.2,
      as.aConcAvg || hs.scoringPct * 1.2
    ) : null;
    var o15  = gp ? gp.o15 : null;
    var o25  = gp ? gp.o25 : null;

    html += "<tr style='"+rowBg+"'>";
    html += "<td "+td+"><span style='font-weight:600'>"+esc(f.home)+"</span> <span style='color:var(--muted);font-size:.65rem'>vs</span> <span style='font-weight:600'>"+esc(f.away)+"</span></td>";
    html += "<td "+td+"><span style='font-size:.65rem;color:var(--muted)'>"+esc(f.date)+"</span><br><span style='font-family:DM Mono,monospace;font-size:.62rem;color:var(--accent)'>"+esc(f.time)+"</span></td>";
    html += "<td "+td+" style='text-align:center'>"+(hScr!==null?cpct(hScr):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(aScr!==null?cpct(aScr):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(btts!==null?cpct(btts):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(o15!==null?cpct(o15):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(o25!==null?cpct(o25):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(hs?("<span style='font-family:DM Mono,monospace;font-size:.75rem;color:"+(hs.scoringStreak>=5?"var(--green)":hs.scoringStreak>=3?"var(--amber)":"var(--muted)")+"'>"+hs.scoringStreak+"</span>"):na())+"</td>";
    html += "<td "+td+" style='text-align:center'>"+(as?("<span style='font-family:DM Mono,monospace;font-size:.75rem;color:"+(as.scoringStreak>=5?"var(--green)":as.scoringStreak>=3?"var(--amber)":"var(--muted)")+"'>"+as.scoringStreak+"</span>"):na())+"</td>";
    html += "</tr>";
  });

  html += "</tbody></table></div>";
  html += "<div style='font-size:.58rem;color:var(--muted);margin-top:10px;line-height:1.6'>";
  html += "Probabilities are fixture-specific: <b style='color:var(--text)'>H/A SCR</b> = attacker scoring rate weighted against opponent clean sheet rate · ";
  html += "<b style='color:var(--text)'>BTTS</b> = both teams scoring rates cross-referenced · ";
  html += "<b style='color:var(--text)'>O1.5/O2.5</b> = average of both teams' historical rates · ";
  html += "<b style='color:var(--text)'>🔥</b> = current consecutive games scored";
  html += "</div>";
  contentEl.innerHTML = html;
}

function f5pts(form) {
  if(!form||!form.length) return 0;
  var pts = 0;
  if(Array.isArray(form)){
    form.slice(0,5).forEach(function(r){ if(r==="W") pts+=3; else if(r==="D") pts+=1; });
  }
  return pts;
}

function showFormLeague(idx) {
  formLeagueIdx = idx;
  document.querySelectorAll("#form-tabs .league-tab").forEach(function(t,i){
    t.className = "league-tab"+(i===idx?" active":"");
  });
  if(formView === "goals") { showGoalsAnalysis(idx); return; }
  var contentEl = document.getElementById("form-content");
  var tbl = formData[idx];
  if(!tbl||!tbl.length){ contentEl.innerHTML = "<p style='color:var(--muted);font-size:.8rem;padding:1rem 0'>No data available.</p>"; return; }

  var sorted = tbl.slice().sort(function(a,b){ return f5pts(b.calcForm)-f5pts(a.calcForm); });

  // Build next fixture lookup for each team from _leagueData
  var leagueSrc = (window._leagueData||[]).find(function(l){ return l.name===LEAGUES[idx].name; });
  var upcomingFixtures = leagueSrc ? (leagueSrc.fixtures||[]) : [];
  var leagueStandings = leagueSrc ? (leagueSrc.standings||[]) : [];

  // Position lookup: teamName -> league position
  var posMap = {};
  leagueStandings.forEach(function(s){ posMap[(s.team||"").toLowerCase()] = s.pos||s.position||99; });
  var totalTeams = leagueStandings.length || 20;

  // Find next fixture for a given team name
  function getNextFixture(teamName) {
    var now = new Date();
    var name = (teamName||"").toLowerCase().trim();
    var words = name.split(" ").filter(function(w){return w.length > 2;});
    
    // Score-based matching: find best match across all upcoming fixtures
    var best = null, bestScore = 0;
    upcomingFixtures.forEach(function(f){
      if(new Date(f.utc) <= now) return;
      var fHome = (f.home||"").toLowerCase();
      var fAway = (f.away||"").toLowerCase();
      
      // Score: count matching significant words
      function scoreMatch(fName) {
        var score = 0;
        words.forEach(function(w){ if(fName.indexOf(w) !== -1) score++; });
        // Bonus for exact substring match of the full name
        if(fName.indexOf(name) !== -1) score += 3;
        return score;
      }
      
      var score = Math.max(scoreMatch(fHome), scoreMatch(fAway));
      if(score > bestScore) { bestScore = score; best = f; }
    });
    
    return bestScore > 0 ? best : null;
  }

  // Calculate difficulty 1-5 from opponent position
  function getDifficulty(opponentName, totalTeams) {
    var pos = posMap[(opponentName||"").toLowerCase()];
    if(!pos) {
      // Try partial match
      var key = Object.keys(posMap).find(function(k){ return k.indexOf((opponentName||"").toLowerCase().split(" ")[0]) !== -1; });
      pos = key ? posMap[key] : Math.ceil(totalTeams/2);
    }
    // Position 1-4 = difficulty 5, 5-8 = 4, 9-14 = 3, 15-17 = 2, 18+ = 1
    if(pos <= 4) return 5;
    if(pos <= 8) return 4;
    if(pos <= 14) return 3;
    if(pos <= 17) return 2;
    return 1;
  }

  // Difficulty dot colours
  var diffColors = {1:"#22c55e",2:"#86efac",3:"#f59e0b",4:"#f97316",5:"#ef4444"};
  var diffLabels = {1:"Very Easy",2:"Easy",3:"Medium",4:"Hard",5:"Very Hard"};

  function renderDifficulty(teamName) {
    var fix = getNextFixture(teamName);
    if(!fix) return "<span style='color:var(--muted2);font-size:.6rem'>No fixture</span>";
    var name = (teamName||"").toLowerCase().trim();
    var words = name.split(" ").filter(function(w){return w.length > 2;});
    var fHome = (fix.home||"").toLowerCase();
    var fAway = (fix.away||"").toLowerCase();
    var homeScore = 0, awayScore = 0;
    words.forEach(function(w){ if(fHome.indexOf(w)!==-1) homeScore++; if(fAway.indexOf(w)!==-1) awayScore++; });
    var isHome = homeScore >= awayScore;
    var opponent = isHome ? fix.away : fix.home;
    var venue = isHome ? "H" : "A";
    var diff = getDifficulty(opponent, totalTeams);
    var color = diffColors[diff];
    var label = diffLabels[diff];
    return "<div style='display:flex;flex-direction:column;gap:3px'>" +
      "<span style='font-size:.65rem;color:"+color+";font-weight:700;letter-spacing:.03em'>"+label+"</span>" +
      "<div style='font-size:.62rem;color:var(--muted)'><span style='background:rgba(255,255,255,.08);padding:1px 4px;border-radius:3px;margin-right:3px'>"+venue+"</span>"+esc(opponent)+"</div>" +
      "<div style='font-size:.58rem;color:var(--muted2)'>"+esc(fix.date)+"</div>" +
      "</div>";
  }

  var html = "<table class='form-tbl'>" +
    "<thead><tr>" +
    "<th>Rank</th>" +
    "<th>Team</th>" +
    "<th title='Points from last 5 games'>L5 Pts</th>" +
    "<th title='Average goals scored at home / away (last 8 games)'>Avg Scored</th>" +
    "<th title='Average goals conceded per game (last 5)'>Avg Conceded</th>" +
    "<th>Last 5</th>" +
    "<th title='Consecutive games scored (last 15)'>Streak</th>" +
    "<th title='Next fixture difficulty 1-5'>Next Fixture</th>" +
    "</tr></thead><tbody>";

  sorted.forEach(function(row, ri) {
    var pts = f5pts(row.calcForm);
    var rankDiff = (row.position||row.pos) - (ri+1);
    var rankHtml = rankDiff > 0
      ? "<span class='rank-chg rank-up'>&#9650;"+rankDiff+"</span>"
      : rankDiff < 0
        ? "<span class='rank-chg rank-dn'>&#9660;"+Math.abs(rankDiff)+"</span>"
        : "<span class='rank-chg rank-eq'>&ndash;</span>";

    var formStrip = "";
    var formResults = (row.calcForm||[]).slice(0,5);
    formResults.forEach(function(r){
      var fc = r==="W"?"fr-w":r==="D"?"fr-d":"fr-l";
      formStrip += "<div class='f5 "+fc+"'>"+r+"</div>";
    });
    if(!formStrip) formStrip = "<span style='color:var(--muted2);font-size:.6rem'>No data</span>";

    // Calculate H/A split from last 8 games
    var last8 = row.last8Games||row.formGames||[];
    var hGames=[], aGames=[];
    last8.forEach(function(g){ if(g.v==="H") hGames.push(g); else aGames.push(g); });

    function avgG(gs){ if(!gs.length) return null; var t=0; gs.forEach(function(g){t+=parseInt((g.s||"0-0").split("-")[0])||0;}); return (t/gs.length).toFixed(1); }
    function gColor(v){ if(v===null) return "color:var(--muted)"; var n=parseFloat(v); return n>=1.5?"color:var(--green)":n<1?"color:var(--red)":"color:var(--amber)"; }

    var hAvg = avgG(hGames);
    var aAvg = avgG(aGames);

    // Still compute conceded from last 5 for the conceded column
    var games = row.formGames||[];
    var conceded=0, btts=0;
    games.slice(0,5).forEach(function(g){
      var parts=(g.s||"0-0").split("-");
      var gs=parseInt(parts[0])||0, gc=parseInt(parts[1])||0;
      conceded+=gc; if(gs>0&&gc>0) btts++;
    });
    var gCount=Math.min(games.length,5)||1;
    var avgConceded=(conceded/gCount).toFixed(1);
    var bttsStr=games.length?Math.round((btts/gCount)*100)+"%":"-";
    var concededColor=parseFloat(avgConceded)>=1.5?"color:var(--red)":parseFloat(avgConceded)<1?"color:var(--green)":"color:var(--amber)";
    var bttsNum=parseInt(bttsStr);
    var bttsColor=bttsNum>=60?"color:var(--green)":bttsNum>=40?"color:var(--amber)":"color:var(--muted)";

    html += "<tr>" +
      "<td><span style='font-family:Bebas Neue,sans-serif;font-size:1.05rem;color:var(--accent)'>"+(ri+1)+"</span>"+rankHtml+"</td>" +
      "<td><div class='team-nm'>"+esc(typeof row.team==="string"?row.team:(row.team.shortName||row.team.name))+"</div><div class='team-pos'>"+ordinal(row.position||row.pos)+" in league</div></td>" +
      "<td><span class='pts-big'>"+pts+"</span></td>" +
      "<td>" +
        "<div style='display:flex;flex-direction:column;gap:2px'>" +
        (hAvg!==null?"<span style='font-family:DM Mono,monospace;font-size:.68rem;"+gColor(hAvg)+"'>"+hAvg+" <span style='font-size:.58rem;opacity:.7'>H</span></span>":"<span style='font-size:.6rem;color:var(--muted)'>— H</span>") +
        (aAvg!==null?"<span style='font-family:DM Mono,monospace;font-size:.68rem;"+gColor(aAvg)+"'>"+aAvg+" <span style='font-size:.58rem;opacity:.7'>A</span></span>":"<span style='font-size:.6rem;color:var(--muted)'>— A</span>") +
        "</div></td>" +
      "<td style='"+concededColor+";font-family:DM Mono,monospace;font-size:.75rem'>"+avgConceded+"</td>" +

      "<td><div class='f5-strip'>"+formStrip+"</div></td>" +
      "<td>" + (function(){
        var last15 = row.last15Games||row.last8Games||[];
        var streak = 0;
        for(var si=0; si<last15.length; si++){
          var gs = parseInt((last15[si].s||"0-0").split("-")[0])||0;
          if(gs > 0) streak++; else break;
        }
        var total = last15.length;
        var streakColor = streak>=10?"var(--green)":streak>=6?"#a3e635":streak>=3?"var(--amber)":"var(--muted)";
        return "<span style='font-family:DM Mono,monospace;font-size:.78rem;color:"+streakColor+";font-weight:600'>"+streak+"</span>" +
               "<span style='font-size:.55rem;color:var(--muted);margin-left:2px'>/"+total+"</span>";
      })() + "</td>" +
      "<td>"+renderDifficulty(typeof row.team==="string"?row.team:(row.team.shortName||row.team.name))+"</td>" +
      "</tr>";
  });
  html += "</tbody></table>";
  contentEl.innerHTML = html;
}

async function loadScorers() {
  if(scorerLoaded) return;
  var tabsEl = document.getElementById("scorer-tabs");
  var contentEl = document.getElementById("scorer-content");

  // Only leagues with scorers (Championship has no scorers on free tier)
  // Championship (ELC) doesn't have scorers endpoint on football-data.org
  var scorerLeagues = LEAGUES.filter(function(lg){ return lg.id !== "ELC"; });

  tabsEl.innerHTML = scorerLeagues.map(function(lg,i){
    return "<div class='league-tab"+(i===0?" active":"")+"' onclick='showScorerLeague("+i+")'>" + renderFlag(lg.flag,lg.flagCode,16) + " "+lg.name+"</div>";
  }).join("");

  contentEl.innerHTML = "<div style='text-align:center;padding:2rem;color:var(--muted);font-size:.8rem'>Loading scorers…</div>";

  contentEl.innerHTML = "<div style='text-align:center;padding:2rem;color:var(--muted);font-size:.8rem'>Loading top scorers…</div>";
  await Promise.all(scorerLeagues.map(async function(lg, si){
    try{
      var sRes = await workerFetch("/competitions/"+lg.id+"/scorers?limit=10");
      scorerData[si] = sRes.scorers||[];
    }catch(e){ 
      scorerData[si]=[];
      console.error("Scorer load error for "+lg.name+":", e.message);
    }
  }));

  scorerLoaded = true;
  showScorerLeague(0);
}

function showScorerLeague(idx) {
