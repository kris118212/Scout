  var maxGoals = scorers[0].goals||scorers[0].numberOfGoals||0;

  var html = "";

    var goals = s.goals||s.numberOfGoals||(s.statistics&&s.statistics.goals)||0;

    var team = s.team||{};
    // Correct team name from player's actual team not scorer obj
    if(!team.shortName && !team.name && player.currentTeam) team = player.currentTeam;

      "<div style='flex:1;min-width:0'>" +
      "<div class='scorer-name'>"+esc(player.name||"Unknown")+"</div>" +
      "<div class='scorer-team'>"+esc(team.shortName||team.name||"")+"</div>" +
      "<div class='goal-bar-wrap' style='width:140px'><div class='goal-bar' style='width:"+pct+"%'></div></div>" +
      "</div>" +
      "<div style='display:flex;flex-direction:column;align-items:flex-end;gap:1px'>" +
      "<div class='goal-count'>"+goals+"</div>" +
      "<div class='goal-label'>Goals</div>" +
      "</div></div>";
  });
  contentEl.innerHTML = html;
}

// PICK TRACKER
// Persists pick outcomes in localStorage under key scout_tracker
// Each entry: { id, league, home, away, pick, date, time, xg, confidence, outcome, addedAt }
// outcome: "pending" | "success" | "failure"
// ══════════════════════════════════════════════════════════

var trackerFilter = "all"; // all | pending | success | failure

function trackerLoad() {
  try { return JSON.parse(localStorage.getItem("scout_tracker") || "[]"); } catch(e) { return []; }
}
function trackerSave(picks) {
  try { localStorage.setItem("scout_tracker", JSON.stringify(picks)); } catch(e) {}
}

// Build a unique ID for a pick
function pickId(league, home, away, date) {
  return (league+"|"+home+"|"+away+"|"+date).toLowerCase().replace(/\s+/g,"_");
}

// Add all picks from current analysis to tracker (if not already tracked)
function trackerSyncFromAnalysis() {
  if (!cachedAnalysis) return 0;
  var existing = trackerLoad();
  var existingIds = new Set(existing.map(function(p){ return p.id; }));
  var added = 0;
  (cachedAnalysis.leagues||[]).forEach(function(lg){
    (lg.picks||[]).forEach(function(pick){
      var pr = pick.primary || {};
      // Only track High confidence picks
      if((pr.confidence||"").toLowerCase() !== "high") return;
      var id = pickId(lg.league, pick.home, pick.away, pick.date);
      if (!existingIds.has(id)) {
        existing.push({
          id: id,
          league: lg.league,
          flagCode: lg.flagCode || "",
          home: pick.home,
          away: pick.away,
          pick: pr.pick || "",
          date: pick.date || "",
          time: pick.time || "",
          xg: pr.xg || null,
          confidence: pr.confidence || "",
          outcome: "pending",
          addedAt: new Date().toISOString()
        });
        added++;
      }
    });
  });
  if (added > 0) trackerSave(existing);
  return added;
}

function trackerSetOutcomeBtn(btn) {
  var id = btn.getAttribute("data-id");
  var outcome = btn.getAttribute("data-outcome");
  trackerSetOutcome(id, outcome);
}

function trackerSetOutcome(id, outcome) {
  var picks = trackerLoad();
  picks = picks.map(function(p){ return p.id === id ? Object.assign({}, p, {outcome: outcome}) : p; });
  trackerSave(picks);
  renderTracker();
}

function setTrackerFilter(filter, btn) {
  trackerFilter = filter;
  document.querySelectorAll(".tracker-btn").forEach(function(b){ b.classList.remove("active"); });
  if (btn) btn.classList.add("active");
  renderTracker();
}

function renderTracker() {
  var el = document.getElementById("tracker-content");
  var badge = document.getElementById("tracker-badge");
  var all = trackerLoad();

  // Sort newest first
  all.sort(function(a,b){ return new Date(b.addedAt)-new Date(a.addedAt); });

  var total = all.length;
  var successes = all.filter(function(p){ return p.outcome==="success"; }).length;
  var failures  = all.filter(function(p){ return p.outcome==="failure"; }).length;
  var pending   = all.filter(function(p){ return p.outcome==="pending"; }).length;
  var settled   = successes + failures;
  var rate      = settled > 0 ? Math.round((successes/settled)*100) : null;

  if (badge) badge.textContent = total + " picks";

  var rateColor = rate===null?"var(--muted)":rate>=65?"var(--green)":rate>=50?"var(--amber)":"#f87171";

  var html = "";

  // Stats bar
  html += "<div class='tracker-stats'>";
  html += "<div class='tracker-stat'><div class='tracker-stat-val' style='color:var(--accent)'>"+total+"</div><div class='tracker-stat-lbl'>Total</div></div>";
  html += "<div class='tracker-stat'><div class='tracker-stat-val' style='color:var(--green)'>"+successes+"</div><div class='tracker-stat-lbl'>Won</div></div>";
  html += "<div class='tracker-stat'><div class='tracker-stat-val' style='color:#f87171'>"+failures+"</div><div class='tracker-stat-lbl'>Lost</div></div>";
  html += "<div class='tracker-stat'><div class='tracker-stat-val' style='color:"+rateColor+"'>"+(rate!==null?rate+"%":"—")+"</div><div class='tracker-stat-lbl'>Win Rate</div></div>";
  html += "</div>";

  // Filter buttons
  html += "<div class='tracker-filter'>";
  html += "<button class='tracker-btn"+(trackerFilter==="all"?" active":"")+"' onclick='setTrackerFilter(\"all\",this)'>All ("+total+")</button>";
  html += "<button class='tracker-btn"+(trackerFilter==="pending"?" active":"")+"' onclick='setTrackerFilter(\"pending\",this)'>Pending ("+pending+")</button>";
  html += "<button class='tracker-btn"+(trackerFilter==="success"?" active":"")+"' onclick='setTrackerFilter(\"success\",this)'>Won ("+successes+")</button>";
  html += "<button class='tracker-btn"+(trackerFilter==="failure"?" active":"")+"' onclick='setTrackerFilter(\"failure\",this)'>Lost ("+failures+")</button>";
  html += "</div>";

  // Sync button
  html += "<div style='background:rgba(0,230,118,.04);border:1px solid rgba(0,230,118,.12);border-radius:8px;padding:.65rem .85rem;margin-bottom:.9rem;font-size:.68rem;color:var(--muted);line-height:1.6'>";
  html += "<span style='color:var(--green);font-weight:600'>High confidence picks only.</span> Only primary picks rated <b style='color:var(--text)'>High</b> (xG ≥ 2.25) are tracked. ";
  html += "Results are resolved automatically once the fixture has finished.";
  html += "</div>";
  html += "<div style='display:flex;justify-content:flex-end;margin-bottom:.8rem'>";
  html += "<button onclick='var n=trackerSyncFromAnalysis();renderTracker();' style='font-size:.6rem;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer'>↻ Sync picks</button>";
  html += "</div>";

  // Filtered picks list
  var filtered = trackerFilter==="all" ? all : all.filter(function(p){ return p.outcome===trackerFilter; });

  // Extra safety filter - only show High confidence in tracker
  filtered = filtered.filter(function(p){ return (p.confidence||"").toLowerCase()==="high" || trackerFilter!=="all"; });
  if (!filtered.length) {
    html += "<div class='tracker-empty'>"+(total===0?"No High confidence picks tracked yet. Visit the Picks page first.":"No "+trackerFilter+" picks.")+"</div>";
  } else {
    filtered.forEach(function(p){
      var outcomeClass = p.outcome==="success"?"success":p.outcome==="failure"?"failure":"pending";
      var outcomeIcon  = p.outcome==="success"?"✓":p.outcome==="failure"?"✗":"?";
      var outcomeLetterClass = p.outcome==="success"?"s":p.outcome==="failure"?"f":"p";
      html += "<div class='tracker-pick "+outcomeClass+"'>";
      html += "<div class='tracker-outcome "+outcomeLetterClass+"'>"+outcomeIcon+"</div>";
      html += "<div class='tracker-info'>";
      html += "<div class='tracker-fixture'>"+esc(p.home)+" <span style='color:var(--muted)'>vs</span> "+esc(p.away)+"</div>";
      html += "<div class='tracker-pick-name'>"+esc(p.pick||"")+"</div>";
      html += "<div class='tracker-meta'>"+esc(p.league)+" · "+esc(p.date)+" "+esc(p.time)+(p.xg?" · xG "+parseFloat(p.xg).toFixed(2):"")+(p.confidence?" · "+esc(p.confidence):"")+(p.score?" · "+esc(p.score):"")+(p.resolvedAt?" · Auto-resolved":"")+"</div>";
      html += "</div>";
      // Action buttons
      html += "<div class='tracker-actions'>";
      if(p.resolvedAt){
        html += "<span style='font-size:.58rem;color:var(--muted);padding:3px 6px'>Auto ↻</span>";
      } else if(p.outcome !== "pending"){
        html += "<button class='tracker-action-btn mark-undo' data-id='"+esc(p.id)+"' data-outcome='pending' onclick='trackerSetOutcomeBtn(this)'>↩</button>";
      } else {
        html += "<span style='font-size:.58rem;color:var(--amber);padding:3px 6px'>Pending</span>";
      }
      html += "</div>";
      html += "</div>";
    });
  }

  el.innerHTML = html;
}

}

// For each pending pick whose fixture date has passed, check the football API
// to see if the match finished and whether the picked team scored
async function trackerAutoResolve() {
  var picks = trackerLoad();
  var pending = picks.filter(function(p){
    if(p.outcome !== "pending") return false;
    var fixtureDate = p.utc ? new Date(p.utc) : (p.date ? new Date(p.date+" "+new Date().getFullYear()) : null);
    if(!fixtureDate || isNaN(fixtureDate)) return false;
    var twoHoursAgo = new Date(new Date().getTime() - 2*60*60*1000);
    return fixtureDate < twoHoursAgo;
  });

  if(!pending.length) return;

  var fmt = function(d){ return d.toISOString().split("T")[0]; };

  // Resolve all pending picks in parallel
  await Promise.all(pending.map(async function(p){
    try {
      var lg = LEAGUES.find(function(l){ return l.name===p.league; });
      if(!lg) return;
      var fixtureDate = new Date(p.utc||p.date+" "+new Date().getFullYear());
      var dateFrom = new Date(fixtureDate); dateFrom.setDate(dateFrom.getDate()-1);
      var dateTo   = new Date(fixtureDate); dateTo.setDate(dateTo.getDate()+1);
      var data = await workerFetch("/competitions/"+lg.id+"/matches?status=FINISHED&dateFrom="+fmt(dateFrom)+"&dateTo="+fmt(dateTo));
      var match = (data.matches||[]).find(function(m){
        var mHome = (m.homeTeam&&(m.homeTeam.name||m.homeTeam.shortName)||"").toLowerCase();
        var mAway = (m.awayTeam&&(m.awayTeam.name||m.awayTeam.shortName)||"").toLowerCase();
        var ph = p.home.toLowerCase(), pa = p.away.toLowerCase();
        return (mHome.indexOf(ph.split(" ")[0])!==-1||ph.indexOf(mHome.split(" ")[0])!==-1) &&
               (mAway.indexOf(pa.split(" ")[0])!==-1||pa.indexOf(mAway.split(" ")[0])!==-1);
      });
      if(!match) return;
      var hg = match.score&&match.score.fullTime&&(match.score.fullTime.home!==undefined?match.score.fullTime.home:match.score.fullTime.homeTeam);
      var ag = match.score&&match.score.fullTime&&(match.score.fullTime.away!==undefined?match.score.fullTime.away:match.score.fullTime.awayTeam);
      if(hg===null||hg===undefined||ag===null||ag===undefined) return;
      var pickTeam = (p.pick||"").replace(" to Score","").trim().toLowerCase();
      var homeTeam = (match.homeTeam&&(match.homeTeam.name||match.homeTeam.shortName)||"").toLowerCase();
      var pickedHome = homeTeam.indexOf(pickTeam.split(" ")[0])!==-1||pickTeam.indexOf(homeTeam.split(" ")[0])!==-1;
      var outcome = (pickedHome ? hg : ag) > 0 ? "success" : "failure";
      // Update this pick in storage immediately
      var all = trackerLoad();
      all = all.map(function(pk){ return pk.id===p.id ? Object.assign({},pk,{outcome:outcome,resolvedAt:new Date().toISOString(),score:hg+"-"+ag}) : pk; });
      trackerSave(all);
    } catch(e) {}
  }));
}
